segments:
  masters:
    - name: Independent Meditation Teachers
      description: |
        Solo facilitators running meditation/breathwork practices
      demographics:
        age: 30-50
        location: Global (English-speaking)
        income: $30K-$80K/year from teaching
      psychographics:
        values: Authenticity, impact, flexibility
        goals: Scale income without losing intimacy
        tech_savvy: Medium (comfortable with Zoom, Telegram)
      pain_points:
        - "Too much admin work (reminders, links, payments)"
        - "Revenue leakage (no-shows, forgotten payments)"
        - "Can't personalize at scale (don't know participant state)"
      jobs_to_be_done:
        - "Schedule recurring practices easily"
        - "Get paid reliably without chasing"
        - "See who's coming and their needs"
      success_metrics:
        - Time saved per week
        - Revenue increase
        - Student retention

    - name: Wellness Coaches
      description: |
        Coaches offering group sessions (life, career, relationships)
      demographics:
        age: 35-55
        location: US/EU
        income: $50K-$150K/year
      psychographics:
        values: Growth, community, professionalism
        goals: Build sustainable coaching practice
        tech_savvy: Medium-High
      pain_points:
        - "Scheduling chaos with multiple clients"
        - "Payment awkwardness (asking for money)"
        - "No data on client progress between sessions"
      jobs_to_be_done:
        - "Manage group coaching calendar"
        - "Collect payment upfront"
        - "Track client engagement and outcomes"
      success_metrics:
        - Client satisfaction (NPS)
        - Booking fill rate
        - Repeat bookings

  users:
    - name: Wellness Seekers
      description: |
        Regular practitioners looking for live guidance
      demographics:
        age: 25-45
        location: Urban, global
        income: $50K+/year
        occupation: Knowledge workers
      psychographics:
        values: Self-improvement, mental health, connection
        goals: Reduce stress, find balance, build routine
        tech_savvy: High (app-native)
      pain_points:
        - "App fatigue (too many wellness apps)"
        - "Hard to commit (forget about sessions)"
        - "Don't know if practices help (no tracking)"
      jobs_to_be_done:
        - "Find practices matching current mood/need"
        - "Show up consistently (need reminders)"
        - "See if it's working (track progress)"
      success_metrics:
        - Practice frequency
        - Perceived improvement (state tracking)
        - Community feeling

    - name: Curious Explorers
      description: |
        New to wellness, trying different approaches
      demographics:
        age: 22-35
        location: Global
        income: $30K-$70K/year
      psychographics:
        values: Discovery, experimentation, openness
        goals: Find what works for them
        tech_savvy: Very high
      pain_points:
        - "Overwhelming options (too many apps/teachers)"
        - "Fear of commitment (what if I don't like it?)"
        - "Don't know where to start"
      jobs_to_be_done:
        - "Try different masters/approaches cheaply"
        - "Get recommendations based on needs"
        - "Avoid long commitments"
      success_metrics:
        - Number of different practices tried
        - Conversion from free to paid
        - Finding a favorite master

personas:
  - name: "Alex the Facilitator"
    role: Master
    age: 38
    background: |
      Former corporate employee turned meditation teacher.
      Certified in MBSR, runs 5 weekly group sessions online.
    goals:
      - Grow from 30 to 100 regular students
      - Spend more time teaching, less on admin
      - Earn enough to quit day job
    frustrations:
      - "I spend 10 hours/week on admin (reminders, links, payments)"
      - "Students forget they signed up, slots go empty"
      - "Can't tell if someone's struggling until they show up"
    quote: "I want to focus on teaching, not chasing payments"
    velo_value:
      - Automates 90% of admin work
      - Pre-practice quiz shows who needs attention
      - Clear pricing and automatic payouts

  - name: "Maya the Seeker"
    role: User
    age: 29
    background: |
      Marketing manager, high stress, tried Headspace but wants live guidance.
      Practices yoga 2x/week, wants to add meditation.
    goals:
      - Build consistent meditation habit
      - Reduce anxiety (currently 7/10, wants 4/10)
      - Feel part of a community
    frustrations:
      - "I tried 5 different apps, none stuck"
      - "I forget about live sessions I booked"
      - "I don't know if meditation helps or I'm just busy"
    quote: "I need accountability and data to stay consistent"
    velo_value:
      - One app for all practices
      - Reminders ensure she shows up
      - State tracking shows anxiety dropping over time

  - name: "Jordan the Explorer"
    role: User
    age: 26
    background: |
      Software engineer, curious about breathwork/meditation/somatic practices.
      Never committed to one approach.
    goals:
      - Try 10+ different teachers/methods
      - Find what resonates
      - Not waste money on long subscriptions
    frustrations:
      - "Every teacher has their own booking system"
      - "I buy monthly access but only try 1-2 sessions"
      - "Hard to compare approaches"
    quote: "I want a sampler platter, not a fixed menu"
    velo_value:
      - Discovery feed of diverse practices
      - Pay-per-session (no long commitment)
      - AI recommendations based on what worked

user_journey:
  master:
    stages:
      - stage: Awareness
        touchpoints:
          - Content marketing (blog post on "scaling meditation business")
          - Referral from another master
          - VELO community announcement
        emotions: Curious, skeptical ("another platform?")

      - stage: Consideration
        touchpoints:
          - Landing page with case study
          - Demo video
          - Free trial offer
        emotions: Hopeful, cautious (will students follow?)
        questions:
          - "How much does it cost?"
          - "Will my students like it?"
          - "Can I migrate from current system?"

      - stage: Onboarding
        touchpoints:
          - Account setup (profile, bio, photo)
          - First practice creation (guided wizard)
          - Test booking with dummy account
        emotions: Excited, a bit overwhelmed
        success_criteria:
          - Profile complete
          - First practice scheduled
          - Invite sent to 5 existing students

      - stage: First Practice
        touchpoints:
          - Reminders sent automatically
          - Pre-practice quiz responses visible
          - Zoom link generated
          - Practice happens
        emotions: Relieved (it worked!), impressed
        success_criteria:
          - >80% attendance
          - Payment collected
          - Post-practice feedback received

      - stage: Retention
        touchpoints:
          - Weekly earnings summary
          - Analytics dashboard (attendance, revenue)
          - Community forum with other masters
        emotions: Confident, invested
        success_criteria:
          - 10+ practices hosted
          - Regular weekly schedule
          - Refers another master

  user:
    stages:
      - stage: Awareness
        touchpoints:
          - Instagram ad from master
          - Friend recommendation
          - VELO app notification
        emotions: Curious, open

      - stage: Consideration
        touchpoints:
          - Browse practice catalog
          - Read master profiles
          - See free practice option
        emotions: Intrigued, cautious (will I like it?)
        questions:
          - "What if I don't like it?"
          - "Is it expensive?"
          - "Do I need equipment?"

      - stage: First Booking
        touchpoints:
          - Select free practice
          - Create account (Telegram/email)
          - Fill pre-practice quiz
          - Receive reminders
        emotions: Excited, slightly nervous
        success_criteria:
          - Quiz completed
          - Showed up to practice
          - Filled post-practice quiz

      - stage: Conversion
        touchpoints:
          - Prompt to book next practice
          - See state improvement in dashboard
          - Master sends personal follow-up
        emotions: Motivated, curious for more
        success_criteria:
          - Books paid practice within 7 days
          - Adds balance to account

      - stage: Retention
        touchpoints:
          - Regular practice attendance
          - State tracking shows progress
          - AI reflection nudges
          - Community interactions
        emotions: Connected, committed
        success_criteria:
          - 4+ practices per month
          - Follows 2+ masters
          - Refers a friend

feedback_loops:
  master:
    - metric: Time saved
      measurement: Survey after 1 month
      target: 5+ hours/week

    - metric: Revenue increase
      measurement: Compare to pre-VELO
      target: +20% within 3 months

    - metric: NPS
      measurement: Quarterly survey
      target: 50+

  user:
    - metric: Practice frequency
      measurement: Bookings per month
      target: 4+ (weekly habit)

    - metric: State improvement
      measurement: Pre/post quiz delta
      target: Anxiety down 2+ points (on 1-10 scale)

    - metric: NPS
      measurement: Quarterly survey
      target: 40+

churn_risks:
  master:
    - risk: Platform fee too high
      mitigation: Show value (time saved + revenue increase)

    - risk: Students don't follow to platform
      mitigation: Easy migration, invite tools, incentives

    - risk: Tech issues (Zoom, payments)
      mitigation: Reliable infrastructure, fast support

  user:
    - risk: Forgets to attend
      mitigation: Multi-channel reminders (Telegram, email, push)

    - risk: No perceived progress
      mitigation: State tracking dashboard, AI insights

    - risk: Favorite master leaves
      mitigation: Discovery feed, recommendations

retention_strategies:
  master:
    - Regular success stories (other masters' wins)
    - Community forum (peer support)
    - Feature requests channel (feel heard)
    - Bonus for referrals (lifetime 10% commission)

  user:
    - Streak tracking (gamification)
    - Progress milestones (10th practice = badge)
    - Personalized recommendations
    - Social features (practice buddies)

project_name: "VELO"
tagline: "Платформа для wellness-фасилитаторов и практикующих"
stage: mvp
tier: T2

vision: |
  Рабочее пространство мастера для проведения live-практик,
  где живые практики, группы и индивидуальная работа соединяются с AI-аналитикой
  и данными о состоянии пользователей.

mission: |
  Объединить живые групповые практики, удобное подключение, возможности для оплаты,
  комьюнити и AI-рефлексию после практики — всё в одном приложении,
  без выхода во внешние сервисы.

problem: |
  МАСТЕРА:
  - Разрозненные инструменты (Zoom, Telegram, Spotify)
  - Потери дохода (постоплата, забывшие участники)
  - Операционная перегрузка (напоминания, ссылки, синхронизация)
  - Сложность масштабирования
  - Отсутствие понимания запросов участников перед практикой
  - Нет инструментов адаптации и фидбэка

  ПОЛЬЗОВАТЕЛИ:
  - Нет единого пространства (каждая практика в своём месте)
  - Сложный вход (чаты, ссылки, оплаты разбросаны)
  - Нет связи с рефлексией
  - Сложно отследить прогресс состояния

solution: |
  Платформа "всё-в-одном" для проведения live-практик с интеграцией:
  - Персональное пространство мастера
  - Live-групповые практики, регулярные серии, 1:1, записи
  - Автоматизация (оплаты, доступы, напоминания)
  - Интеграция с YON State Engine (состояние группы до/после)
  - Личный трекинг и AI-рефлексия для пользователей
  - Discovery-механика (поиск новых мастеров)

target_audience: |
  МАСТЕРА (B-сторона):
  - Фасилитаторы, тренеры, коучи
  - Проводят групповые практики (медитация, дыхание, йога, майндфулнесс)
  - Хотят масштабировать работу без операционной перегрузки

  ПОЛЬЗОВАТЕЛИ (C-сторона):
  - Практикующие wellness и mindfulness
  - Хотят отслеживать прогресс и связывать практики с состоянием
  - Ищут новых мастеров и подходы

unique_value: |
  1. ЕДИНОЕ ПРОСТРАНСТВО - все инструменты (практики, оплата, комьюнити) в одном месте
  2. AI-АНАЛИТИКА - состояние участников до/после, персональная рефлексия
  3. АВТОМАТИЗАЦИЯ - минимум ручной работы для мастера
  4. ВСТРОЕННАЯ МОНЕТИЗАЦИЯ - прозрачная система платежей (15% комиссия)
  5. ДАННЫЕ О СОСТОЯНИИ - интеграция с YON State Engine

success_metrics: |
  - Количество активных мастеров
  - Количество проведённых практик
  - Retention пользователей (участие в повторных практиках)
  - Conversion: free → paid практики
  - GMV (Gross Merchandise Value)
  - NPS мастеров и пользователей

risks: |
  - Зависимость от Zoom API (для live-практик)
  - Конкуренция с Calendly/Mindbody
  - Сложность привлечения первых мастеров (chicken-egg problem)
  - Регуляция платежей в разных странах
  - Качество контента мастеров (need verification flow)

assumptions: |
  - Мастера готовы платить 15% комиссию за автоматизацию
  - Пользователи хотят связывать практики с данными о состоянии
  - Telegram бот будет достаточен для MVP (без mobile app)
  - Stripe поддерживает нужные рынки
  - YON State Engine API готов для интеграции

notes: |
  - Проект назывался "YON Master Rooms", переименован в VELO (февраль 2026)
  - Архитектура: 9 микросервисов + API Gateway
  - Tech Stack: FastAPI, PostgreSQL, Redis, APScheduler
  - Deployment: Docker + Kubernetes
  - Два типа промокодов: Company Promo (компания платит) и Master Promo (мастер снижает доход)
  - Double-entry журналирование для финансов (user_ledger, master_ledger, company_ledger)

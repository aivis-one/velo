features:
  core:
    - name: Master Profile & Space
      description: |
        Персональное пространство мастера внутри YON:
        - Единый аккаунт (без дублирования)
        - Профиль: подход/метод, формат работы, опыт
        - Статус доступности (accepting/paused)
      priority: P0
      status: planned

    - name: Live Practice Management
      description: |
        Создание и проведение практик:
        - Live-групповые практики
        - Регулярные практики (серии)
        - Индивидуальные сессии (1:1)
        - Replay (записи)
      priority: P0
      status: planned

    - name: Booking & Calendar
      description: |
        Бронирование и расписание:
        - Календарь практик
        - Бронирование мест
        - Автоматические напоминания (24h, 1h, 10min)
        - Zoom link generation
      priority: P0
      status: planned

    - name: Payment System
      description: |
        Встроенная монетизация:
        - Stripe integration
        - User balance (пополнение, трата)
        - Master balance (заработок, вывод)
        - Company ledger (комиссия 15%)
        - Double-entry журналирование
      priority: P0
      status: planned

    - name: Quiz & State Integration
      description: |
        Квизы до/после практики:
        - 5 типов вопросов (scale, emotion, choice, multi, text)
        - Интеграция с YON State Engine
        - Мастер видит состояние группы
        - Пользователь видит личную динамику
      priority: P0
      status: planned

    - name: Notification System
      description: |
        Многоканальные уведомления:
        - User DM (Telegram)
        - Channel posts
        - Group messages
        - Forum threads
        - Priority queue + retry logic
      priority: P0
      status: planned

  secondary:
    - name: Master Verification
      description: |
        Верификация мастеров:
        - pending_verification → verified → suspended/banned
        - Права и ограничения по статусам
      priority: P1
      status: planned

    - name: Promo Codes
      description: |
        Два типа промокодов:
        - Company Promo (компания платит мастеру полную долю)
        - Master Promo (мастер снижает свой доход, 5%/25%/50%/75%/100%)
      priority: P1
      status: planned

    - name: Library (Recordings)
      description: |
        Видеозаписи практик:
        - S3/CDN storage
        - Access control
        - Playback tracking
      priority: P1
      status: planned

    - name: Discovery & Recommendations
      description: |
        Поиск мастеров и практик:
        - Фильтры (тип практики, язык, время)
        - AI-рекомендации на основе состояния
      priority: P2
      status: future

user_stories:
  master:
    - as: Master
      want: Create a regular meditation practice (every Monday 7pm)
      so_that: My students can book and I automate reminders
      acceptance:
        - Can set recurring schedule
        - Can set price (or free)
        - Can add pre-practice quiz
        - System sends reminders automatically

    - as: Master
      want: See participant state before practice
      so_that: I can adapt the session to group needs
      acceptance:
        - Quiz responses visible before start
        - State Engine data available
        - Dashboard shows group average

    - as: Master
      want: Withdraw my earnings to bank account
      so_that: I get paid for my work
      acceptance:
        - Can request withdrawal (min $50)
        - Admin approves manually
        - Master sees transaction history

  user:
    - as: User
      want: Book a practice and receive reminders
      so_that: I don't forget and have all info ready
      acceptance:
        - Can pay from balance or Stripe
        - Receive reminder 24h before
        - Receive reminder 1h before
        - Receive Zoom link 10min before

    - as: User
      want: Track my state before/after practice
      so_that: I see if practices help me
      acceptance:
        - Fill quiz before practice
        - Fill quiz after practice
        - See personal trends over time
        - Get AI-generated reflection

    - as: User
      want: Discover new masters matching my needs
      so_that: I try different approaches
      acceptance:
        - Can filter by practice type
        - Can see master profiles
        - Can read reviews (future)
        - Get AI recommendations based on state

flow_diagrams:
  - name: Booking Flow
    path: tech_spec/diagrams/02-api-flow-booking.mermaid
    description: From practice selection to Zoom link delivery

  - name: Payment Flow
    description: |
      User pays $50 for practice:
      1. User balance: -$50
      2. Master balance: +$42.50 (85%)
      3. Company ledger: +$7.50 (15%)
      Σ = 0 (double-entry)

  - name: Promo Code Flow (Company)
    description: |
      Company promo (WELCOME, 100% off):
      1. User pays: $0
      2. Master gets: +$42.50 (full 85%)
      3. Company commission: +$7.50
      4. Company marketing: -$50.00
      Σ = 0

  - name: Promo Code Flow (Master)
    description: |
      Master promo (ALEX-VIP, 100% off):
      1. User pays: $0
      2. Master gets: $0
      3. Company commission: $0
      Σ = 0 (master gave access for free)

  - name: Master Verification Flow
    path: tech_spec/diagrams/08-master-verification-flow.mermaid
    description: pending → verified → suspended/banned

roadmap:
  mvp:
    target_date: "2026-Q1"
    features:
      - Master profiles
      - Live practice creation
      - Booking & payment
      - Zoom integration
      - Basic notifications
      - Simple quiz (scale + text)
    scope: Telegram bot only

  v1.0:
    target_date: "2026-Q2"
    features:
      - Web app (responsive)
      - Full quiz types (5 types)
      - YON State Engine integration
      - Master verification flow
      - Library (recordings)
      - Company promo codes

  v2.0:
    target_date: "2026-Q3"
    features:
      - Mobile apps (iOS/Android)
      - Discovery & recommendations
      - Reviews & ratings
      - Advanced analytics
      - Referral program
      - Gift certificates

edge_cases:
  cancellations:
    user_cancels:
      - "> 24h before: 100% refund"
      - "< 24h before: 0% refund"
      - "Decision: Variant A (simple)"

    master_cancels:
      - "Auto 100% refund to all participants"
      - "No penalty in MVP (add later if abuse detected)"

  no_show:
    - "User paid but didn't attend"
    - "Money stays with master (they prepared)"
    - "No auto-refund"

  promo_conflicts:
    - "Company promo takes priority over Master promo"
    - "Only one promo per purchase"

open_questions:
  - question: "Master Promo: комиссия от полной или фактической цены?"
    options:
      - "A: 15% от фактической (юзер платит $25 → мастер $21.25, компания $3.75)"
      - "B: 15% от полной ($50 → мастер $17.50, компания $7.50)"
    recommendation: "Option A (мастер уже снижает доход, не надо еще и комиссию повышать)"
    status: pending

  - question: "Minimum withdrawal amount?"
    options:
      - "A: $10"
      - "B: $50"
      - "C: No limit"
    recommendation: "Option B ($50 to reduce transfer overhead)"
    status: pending

  - question: "Withdrawal fee?"
    options:
      - "A: 0% (platform doesn't charge)"
      - "B: Fixed $2"
      - "C: 1-2%"
    recommendation: "Option A (keep MVP simple)"
    status: pending

  - question: "Referral program in MVP?"
    recommendation: "No. Ledger structure supports it, implement after PMF"
    status: deferred

  - question: "Gift certificates in MVP?"
    recommendation: "No. Not MVP priority"
    status: deferred

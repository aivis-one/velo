architecture:
  type: Microservices
  pattern: API Gateway + 9 Services
  communication: REST (inter-service), WebSocket (real-time)

  services:
    - name: API Gateway
      responsibility: Routing, auth, rate limiting
      tech: FastAPI
      port: 8000

    - name: User Service
      responsibility: |
        User management, authentication, multi-platform credentials
        JSONB pattern for telegram/web/discord IDs
      tech: FastAPI + PostgreSQL
      port: 8001

    - name: Practice Service
      responsibility: |
        Practice CRUD, pricing, scheduling
        Quiz management (5 types: scale/emotion/choice/multi/text)
      tech: FastAPI + PostgreSQL
      port: 8002

    - name: Quiz Service
      responsibility: |
        Quiz templates, responses, validation
        Pre/post practice data collection
      tech: FastAPI + PostgreSQL
      port: 8003

    - name: Calendar Service
      responsibility: |
        Scheduling, reminders (24h/1h/10min)
        APScheduler for background jobs
      tech: FastAPI + APScheduler + Redis
      port: 8004

    - name: Notification Service
      responsibility: |
        Multi-channel notifications (user/channel/group/thread)
        Priority queue, retry logic (3 attempts)
      tech: FastAPI + Redis + Celery
      port: 8005

    - name: Booking Service
      responsibility: |
        Reservations, attendance tracking, cancellations
      tech: FastAPI + PostgreSQL
      port: 8006

    - name: Payment Service
      responsibility: |
        Stripe integration, balance management
        Double-entry ledger (user_ledger, master_ledger, company_ledger)
      tech: FastAPI + Stripe SDK + PostgreSQL
      port: 8007

    - name: State Service
      responsibility: |
        YON State Engine integration
        Check-in/check-out tracking
      tech: FastAPI + YON API
      port: 8008

    - name: Library Service
      responsibility: |
        Recording upload, S3 storage, CDN, access control
      tech: FastAPI + S3 + CloudFront
      port: 8009

tech_stack:
  backend:
    framework: FastAPI
    version: ">=0.100"
    rationale: Modern, async, auto OpenAPI docs

  database:
    primary: PostgreSQL 15+
    features:
      - JSONB for flexible data (credentials, quiz answers)
      - GIN indexes for JSONB queries
      - Foreign keys for relations
      - Triggers for audit trail

  cache:
    system: Redis 7+
    use_cases:
      - Session storage
      - APScheduler job store
      - Celery task queue
      - Rate limiting

  orm:
    tool: SQLAlchemy 2.0
    patterns:
      - Async sessions
      - Type hints
      - Relationship lazy loading

  task_queue:
    system: Celery
    broker: Redis
    use_cases:
      - Email sending
      - Notification delivery
      - Video processing

  payments:
    provider: Stripe
    features:
      - One-time payments
      - Subscriptions (future)
      - Webhooks for events
      - Multi-currency support

  storage:
    provider: AWS S3 / CloudFlare R2
    cdn: CloudFront / CloudFlare CDN
    use_case: Practice video recordings

  video:
    provider: Zoom
    integration: Zoom API
    limits: Need to clarify (participants, duration)

  monitoring:
    apm: Sentry
    metrics: Prometheus + Grafana
    logs: ELK Stack (Elasticsearch, Logstash, Kibana)

  deployment:
    containerization: Docker
    orchestration: Kubernetes
    ci_cd: GitHub Actions
    hosting: TBD (AWS/GCP/DigitalOcean)

database_schema:
  tables:
    - name: users
      description: |
        User accounts with multi-platform credentials (JSONB)
      key_fields:
        - id (PK)
        - credentials (JSONB): {telegram_id, web_email, discord_id}
        - created_at, last_login

    - name: master_profiles
      description: |
        Master-specific data (1:1 with users)
      key_fields:
        - user_id (PK, FK to users)
        - bio, approach, experience
        - verification_status (pending/verified/suspended/banned)
        - is_accepting_clients (boolean)
        - frozen_amount (Decimal): Money waiting for practice completion
        - available_amount (Decimal): Money ready to withdraw
        - data (JSONB): stats, settings
      notes: |
        frozen_amount and available_amount are denormalized fields
        updated by listeners on master_ledger changes for fast access

    - name: practices
      description: Practice definitions
      key_fields:
        - id (PK)
        - master_id (FK to users)
        - title, description
        - price_cents, currency
        - format (live_group/recurring/one_on_one/replay)
        - scheduled_at, duration_minutes

    - name: practice_pricing
      description: Pricing tiers for practices
      key_fields:
        - id (PK)
        - practice_id (FK)
        - type (single/package/subscription)
        - price_cents

    - name: practice_quizzes
      description: Quiz templates (pre/post practice)
      key_fields:
        - id (PK)
        - practice_id (FK)
        - timing (pre/post)
        - questions (JSONB array)

    - name: bookings
      description: User reservations
      key_fields:
        - id (PK)
        - user_id (FK)
        - practice_id (FK)
        - status (pending/confirmed/cancelled/completed)
        - payment_status (unpaid/paid/refunded)

    - name: quiz_responses
      description: User answers to quizzes
      key_fields:
        - id (PK)
        - booking_id (FK)
        - user_id (FK)
        - quiz_id (FK)
        - answers (JSONB)
        - submitted_at

    - name: user_ledger
      description: |
        User balance journal (double-entry)
        Balance = SUM(amount)
      key_fields:
        - id (PK)
        - user_id (FK)
        - amount (Decimal): can be + or -
        - reason (text): "payment:123", "purchase:456", "refund:789"
        - created_at

    - name: master_ledger
      description: |
        Master earnings journal (double-entry)
        Frozen Balance = SUM(amount WHERE is_frozen=true)
        Available Balance = SUM(amount WHERE is_frozen=false)
      key_fields:
        - id (PK)
        - user_id (FK to users where is_master=true)
        - amount (Decimal)
        - is_frozen (boolean): true if waiting for practice completion
        - reason (text): "sale:456", "withdrawal:789", "transfer:internal", "commission:456"
        - created_at
      notes: |
        Listeners update master_profiles.frozen_amount and available_amount
        on each insert/update to keep denormalized totals in sync

    - name: company_ledger
      description: |
        Platform revenue journal (double-entry)
      key_fields:
        - id (PK)
        - amount (Decimal)
        - type (commission/marketing/refund)
        - reason (text): "commission:practice=456", "promo:WELCOME"
        - created_at

    - name: payments
      description: External payment transactions
      key_fields:
        - id (PK)
        - user_id (FK)
        - direction (in/out): deposit or withdrawal
        - amount (Decimal)
        - status (pending/confirmed/failed)
        - stripe_payment_id
        - created_at

    - name: purchases
      description: Practice purchase records
      key_fields:
        - id (PK)
        - user_id (FK)
        - practice_id (FK)
        - amount (Decimal): original price
        - discount (Decimal): promo discount
        - promo_code (text, nullable)
        - created_at

    - name: promo_codes
      description: Promotional codes
      key_fields:
        - id (PK)
        - code (unique)
        - type (company/master): who pays for discount
        - discount_percent (5/25/50/75/100)
        - scope: all or specific practices
        - master_id (FK, nullable): if master promo
        - valid_from, valid_until

    - name: subscriptions
      description: User subscriptions (future)
      key_fields:
        - id (PK)
        - user_id (FK)
        - plan (text)
        - status (active/cancelled/expired)
        - stripe_subscription_id

api_design:
  principles:
    - RESTful conventions
    - Versioned (/v1/)
    - Consistent error responses
    - Pagination for lists
    - OpenAPI docs auto-generated

  authentication:
    method: JWT tokens
    storage: Redis (sessions)
    refresh: Refresh token rotation

  error_format:
    structure: |
      {
        "error": {
          "code": "INSUFFICIENT_BALANCE",
          "message": "User balance too low",
          "details": {"required": 50, "available": 30}
        }
      }

  pagination:
    format: |
      {
        "data": [...],
        "meta": {
          "page": 1,
          "per_page": 20,
          "total": 150
        }
      }

deployment:
  environments:
    - name: Development
      url: dev.velo.com
      purpose: Active development

    - name: Staging
      url: staging.velo.com
      purpose: Pre-production testing

    - name: Production
      url: app.velo.com
      purpose: Live system

  containers:
    - All services in Docker
    - Docker Compose for local dev
    - Kubernetes for production
    - Helm charts for deployment

  ci_cd:
    pipeline:
      - Lint (Black, Flake8, MyPy)
      - Unit tests (pytest)
      - Integration tests
      - Build Docker images
      - Push to registry
      - Deploy to K8s

  monitoring:
    health_checks: /health endpoint per service
    metrics: Prometheus scraping
    alerting: PagerDuty for critical
    logs: Centralized in ELK

security:
  - HTTPS only
  - JWT token auth
  - Rate limiting (by IP and user)
  - CORS configured
  - SQL injection prevention (ORM)
  - Input validation (Pydantic)
  - Stripe webhook signature verification
  - Master verification flow
  - Admin-only withdrawal approval

testing:
  unit: pytest, >80% coverage
  integration: pytest + TestClient
  e2e: Playwright (future)
  load: Locust (before production)

technical_debt:
  known_issues:
    - APScheduler might not scale (consider Temporal/Airflow later)
    - Manual withdrawal approval (automate later)
    - No mobile apps yet (Telegram bot MVP)
    - Zoom API limits unclear (need clarification)
    - S3 provider not decided (AWS vs CloudFlare R2)
    - K8s hosting not decided (AWS EKS vs GCP GKE vs DO)

  refactoring_needed:
    - JSONB → relational migration plan (when schema stabilizes)
    - Ledger audit reports (not in MVP)
    - Multi-currency support (hardcoded USD for MVP)

dependencies:
  external_services:
    - Stripe (payments)
    - Zoom (video)
    - YON State Engine (state data)
    - S3/R2 (storage)
    - CDN (video delivery)

  critical_paths:
    - Stripe webhooks (must be reliable)
    - Zoom API (must not hit limits)
    - YON State Engine API (must be available)

positioning:
  tagline: "Live practices meet AI insights — all in one platform"

  elevator_pitch: |
    VELO is the all-in-one platform for wellness facilitators and practitioners.
    Masters get automated scheduling, payments, and participant insights.
    Users get seamless booking, state tracking, and personalized recommendations.
    Everything happens in one place — no more app-hopping.

  value_propositions:
    for_masters:
      - "Save 10 hours/week on admin work"
      - "Earn 20% more with better fill rates"
      - "See participant state before practice (adapt on the fly)"

    for_users:
      - "One app for all your wellness practices"
      - "Track how practices improve your state (data-driven)"
      - "Never forget a session (smart reminders)"

messaging:
  master_messaging:
    headline: "Focus on Teaching, Not Admin"
    subheadline: "VELO automates scheduling, payments, and reminders so you can scale without the chaos"
    benefits:
      - "Automated reminders → 90% attendance (vs 60% manual)"
      - "Pre-practice insights → better personalization"
      - "Clear pricing → no awkward money conversations"
    cta: "Start Your First Practice Free"

  user_messaging:
    headline: "Your Wellness Journey, All in One Place"
    subheadline: "Live practices, progress tracking, and AI-powered insights"
    benefits:
      - "Discover practices that match your current state"
      - "See your progress over time (anxiety, energy, focus)"
      - "Show up consistently (reminders that actually work)"
    cta: "Join Your First Practice"

brand_voice:
  tone:
    - Supportive (not pushy)
    - Data-informed (not cold)
    - Empowering (not prescriptive)

  examples:
    good: "Your state improved 30% after 5 practices — keep it up!"
    bad: "You're not doing enough. Practice more!"

    good: "Masters on VELO save 10 hours/week on average"
    bad: "Admin work is killing your business"

channels:
  organic:
    - channel: Content Marketing
      tactics:
        - Blog: "How to Scale Your Meditation Business"
        - YouTube: Master success stories
        - Podcast guest appearances
      target: Masters (awareness)
      budget: $0 (time investment)

    - channel: Community Partnerships
      tactics:
        - VELO ecosystem integration
        - Wellness community ambassadors
        - Reddit (r/meditation, r/yoga)
      target: Both masters and users
      budget: $0

    - channel: SEO
      keywords:
        - "online meditation platform"
        - "wellness scheduling software"
        - "group practice management"
      target: Masters (consideration)
      budget: $2K/month (content creation)

    - channel: Referral Program
      tactics:
        - Master refers master → both get 10% commission (lifetime)
        - User refers user → both get $5 credit
      target: Both
      budget: Commission cost (built into model)

  paid:
    - channel: Google Ads
      campaigns:
        - "Meditation scheduling software" (masters)
        - "Live meditation classes" (users)
      target: Both
      budget: $5K/month (year 1), $20K/month (year 2)
      expected_cac: $30 users, $300 masters

    - channel: Meta Ads (Facebook/Instagram)
      campaigns:
        - Carousel ads (master success stories)
        - Video ads (practice previews)
      target: Users primarily
      budget: $3K/month
      expected_cac: $25 users

    - channel: LinkedIn Ads
      campaigns:
        - B2B (corporate wellness programs)
      target: Enterprise
      budget: $2K/month (starting year 2)

    - channel: Influencer Partnerships
      tactics:
        - Micro-influencers (10K-100K followers)
        - Wellness YouTubers, podcasters
        - Affiliate commission (5% of GMV for 6 months)
      target: Users
      budget: $5K/month (gifts + commission)

  owned:
    - channel: Email Marketing
      segments:
        - Masters: Weekly tips, success stories, feature updates
        - Users: Practice recommendations, progress reports
      automation:
        - Onboarding series (5 emails)
        - Re-engagement (if inactive 14 days)
        - Milestone celebrations (10th practice)
      budget: $500/month (SendGrid/Mailchimp)

    - channel: In-App Messaging
      tactics:
        - Push notifications (practice reminders)
        - In-app tips (how to fill your first practice)
      budget: $0 (built-in)

acquisition_funnel:
  master:
    awareness:
      - Content marketing (blog, YouTube)
      - Community word-of-mouth
      - Google search

    consideration:
      - Landing page (case studies, pricing)
      - Demo video (2 min walkthrough)
      - Comparison chart (vs Mindbody, Calendly)

    conversion:
      - Free trial (first practice free, no card required)
      - Onboarding wizard (guided setup)

    activation:
      - First practice scheduled
      - First 5 students invited
      - First practice completed

    retention:
      - Weekly earnings summary
      - Analytics dashboard
      - Community forum access

  user:
    awareness:
      - Master invites (when they migrate)
      - Social media (organic + paid)
      - VELO app integration

    consideration:
      - Browse practice catalog
      - Read master profiles
      - See free practice option

    conversion:
      - Sign up (Telegram/email, <1 min)
      - Book free practice

    activation:
      - Attend first practice
      - Fill post-practice quiz
      - See state data

    retention:
      - Smart reminders (based on past behavior)
      - Progress dashboard
      - AI recommendations

content_strategy:
  blog_topics:
    for_masters:
      - "5 Ways to Fill Your Meditation Classes (Without Social Media)"
      - "How to Price Your Wellness Services (Data-Backed)"
      - "The Hidden Cost of Manual Scheduling (Time Study)"

    for_users:
      - "How to Build a Consistent Meditation Practice (Science)"
      - "Finding the Right Facilitator for Your Needs"
      - "Tracking Your Wellness Progress: Why Data Matters"

  video_content:
    - Master testimonials (30-60 sec)
    - Practice previews (90 sec samples)
    - Feature tutorials (how to use VELO)

  case_studies:
    - "How Alex Grew from 30 to 200 Students in 6 Months"
    - "Maya's Anxiety Dropped 40% After 10 Practices (Data)"

launch_strategy:
  beta_phase:
    duration: 2 months
    target: 10 masters, 100 users
    channels: VELO community, direct outreach
    offer: Free during beta + lifetime 10% commission
    success_metrics:
      - 10 masters onboarded
      - 50+ practices hosted
      - NPS >50

  public_launch:
    timing: Month 3
    channels: Product Hunt, Hacker News, social media
    offer: Free tier for small masters (<10 practices/month)
    pr: Press release to wellness media (MindBodyGreen, Elephant Journal)
    success_metrics:
      - 100 masters in first month
      - 1,000 users
      - Media coverage (3+ articles)

  scale_phase:
    timing: Month 6+
    channels: Paid ads, partnerships, referrals
    offer: Standard 15% commission
    success_metrics:
      - 1,000 masters by month 12
      - $1M GMV/month
      - Positive ROI on paid channels

events:
  - name: Master Webinars
    frequency: Monthly
    topic: "Scaling Your Wellness Business"
    format: 30 min presentation + 15 min Q&A
    goal: Educate + convert masters

  - name: User Wellness Challenges
    frequency: Quarterly
    format: 30-day practice challenge with prizes
    goal: Engagement + retention

partnerships:
  - partner: YON Ecosystem
    type: Strategic integration
    benefit: Shared user base, state data sync
    status: In progress

  - partner: Wellness Influencers
    type: Content partnership
    benefit: Guest posts, reviews, affiliate links
    status: To be initiated

  - partner: Professional Associations
    type: Distribution
    benefit: Access to certified facilitators (MBSR, etc.)
    status: To be explored

  - partner: Corporate Wellness Vendors
    type: Reseller
    benefit: B2B channel for enterprise
    status: Future (year 2)

metrics:
  awareness:
    - Website traffic
    - Social media reach
    - Content shares

  consideration:
    - Landing page conversion rate
    - Demo video completion rate
    - Trial signups

  conversion:
    - Master activation rate (first practice)
    - User activation rate (first booking)

  retention:
    - 30-day retention
    - 90-day retention
    - Churn rate

  referral:
    - Viral coefficient (K-factor)
    - Referral conversion rate

competitive_messaging:
  vs_mindbody:
    velo_advantage: "Simpler, cheaper, with AI insights"
    message: "Built for live group practices, not gym management"

  vs_calendly:
    velo_advantage: "Includes payments, community, and analytics"
    message: "Not just scheduling — the entire practice experience"

  vs_diy_zoom_stripe:
    velo_advantage: "No manual work, automated everything"
    message: "10 hours saved per week, proven by our masters"

brand_assets:
  logo: TBD
  colors: TBD (wellness palette: greens, blues, soft purples)
  fonts: TBD (modern, readable)
  imagery: Real masters and users (authentic, diverse)

launch_checklist:
  pre_launch:
    - [ ] Landing page live
    - [ ] Demo video ready
    - [ ] Case studies (2-3 beta masters)
    - [ ] Press kit (logo, screenshots, copy)
    - [ ] Product Hunt page drafted
    - [ ] Email list (100+ potential users)

  launch_week:
    - [ ] Product Hunt submission
    - [ ] Social media blitz
    - [ ] Email to waitlist
    - [ ] Reddit/community posts
    - [ ] Press outreach (5+ outlets)

  post_launch:
    - [ ] Monitor feedback (Slack, social)
    - [ ] Rapid bug fixes
    - [ ] Success stories (highlight early wins)
    - [ ] Iterate messaging based on data

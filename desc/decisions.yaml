decisions:
  - id: ADR-001
    title: Microservices Architecture
    date: "2025-12-27"
    status: Accepted
    context: |
      Need to build scalable platform with 9 distinct domains:
      User, Practice, Quiz, Calendar, Notification, Booking, Payment, State, Library
    decision: |
      Use microservices architecture with API Gateway pattern.
      Each service owns its data, communicates via REST API.
    rationale:
      - Team can work autonomously on different services
      - Services can scale independently
      - Technology choices flexible per service
      - Clear boundaries prevent coupling
    consequences:
      - Positive: Scalability, team autonomy, tech flexibility
      - Negative: Distributed system complexity, monitoring overhead
      - Mitigation: Start with Docker Compose, migrate to K8s gradually
    alternatives:
      - Monolith: Faster initial development but hard to scale
      - Serverless: Lower ops but cold starts and vendor lock-in

  - id: ADR-002
    title: JSONB for Multi-Platform Credentials
    date: "2025-12-27"
    status: Accepted
    context: |
      Users can connect via Telegram, Web, Discord, etc.
      Don't know all future platforms.
      Traditional approach: telegram_id, web_email columns (rigid)
    decision: |
      Store credentials in JSONB column: {telegram_id, web_email, discord_id}
      Use GIN index for fast queries.
    rationale:
      - Schema flexibility (add new platforms without migration)
      - All credentials in one place (SSOT)
      - PostgreSQL JSONB fast with GIN index
    consequences:
      - Positive: No migrations for new platforms, flexible
      - Negative: Harder to enforce constraints at DB level
      - Mitigation: Application-level validation, future migration to relational if needed
    alternatives:
      - Separate columns: Rigid, migration for each platform
      - Key-value store: Adds complexity, loses ACID

  - id: ADR-003
    title: APScheduler for Reminders
    date: "2025-12-27"
    status: Accepted
    context: |
      Need to send reminders 24h, 1h, 10min before practice.
      Options: APScheduler, Celery Beat, Temporal, Airflow
    decision: |
      Use APScheduler (Python library) with Redis backend.
    rationale:
      - Simple, Python-native, no external service
      - Redis persistence (survives restarts)
      - Good for MVP (<10K scheduled jobs)
    consequences:
      - Positive: Easy to implement, minimal ops
      - Negative: Won't scale to 100K+ jobs
      - Mitigation: Plan migration to Temporal/Airflow if needed (post-PMF)
    alternatives:
      - Celery Beat: More complex, overkill for reminders
      - Temporal: Powerful but steep learning curve
      - Airflow: Heavy, designed for data pipelines

  - id: ADR-004
    title: Double-Entry Ledger with Frozen/Available Split
    date: "2026-02-06"
    status: Accepted
    context: |
      Need to track money flows: user deposits, practice purchases, master earnings, withdrawals.
      Risk of "lost money" if system has bugs.
      Masters need to see money immediately but can't withdraw until practice completes.
      Need to support refunds before practice without complex rollbacks.
    decision: |
      Use double-entry accounting with 3 ledgers:
      - user_ledger (user balance journal)
      - master_ledger (earnings journal with is_frozen flag)
      - company_ledger (platform revenue journal)

      Master Balance split into two states:
      - Frozen: Money waiting for practice completion (cannot withdraw)
      - Available: Money after practice done (can withdraw)

      Denormalized totals (frozen_amount, available_amount) stored in master_profiles,
      updated by database listeners on each master_ledger change.

      Commission charged only AFTER practice completes (from available).
    rationale:
      - Accounting standard, proven for centuries
      - Every transaction sums to zero (easy audit)
      - Impossible to "lose" money (all tracked)
      - Frozen state protects both parties (refunds possible)
      - User pays Master 100% upfront, Master pays Company 15% after
      - Denormalized fields for fast UI queries (no SUM on every request)
    consequences:
      - Positive: Audit trail, clear refund flow, fast balance lookups
      - Negative: Need listeners to maintain denormalized totals
      - Mitigation: Well-tested trigger/listener pattern, wrapped in transactions
    alternatives:
      - Balance column: Simpler but prone to bugs, hard to refund
      - No frozen split: Complex refund logic, race conditions
      - Blockchain: Overkill, expensive, slow

  - id: ADR-005
    title: Two Promo Types (Company vs Master)
    date: "2026-02-05"
    status: Accepted
    context: |
      Need promotional codes for two use cases:
      1. Company wants to attract users (marketing)
      2. Master wants to give access (already paid offline)
    decision: |
      Two promo types with different economics:
      - Company Promo: Master gets full 85%, company absorbs discount
      - Master Promo: Master reduces own revenue (5%/25%/50%/75%/100%)
    rationale:
      - Company promo: Marketing investment, master shouldn't lose income
      - Master promo: Flexibility for offline payments, loyalty programs
      - Clear separation prevents confusion
    consequences:
      - Positive: Fair economics for both use cases
      - Negative: Two code paths to maintain
      - Mitigation: Shared validation logic, clear documentation
    alternatives:
      - Single promo type: Unfair to either master or company
      - No promos: Limits growth and flexibility

  - id: ADR-006
    title: Manual Withdrawal Approval
    date: "2026-02-05"
    status: Accepted
    context: |
      Masters want to withdraw earnings.
      Options: Automatic (via Stripe Connect) or Manual (admin approves)
    decision: |
      Manual approval by admin for MVP.
      Admin sees request, verifies, transfers via bank.
    rationale:
      - Simple to implement (no Stripe Connect setup)
      - Fraud protection (admin can spot suspicious patterns)
      - Flexible (can handle edge cases manually)
    consequences:
      - Positive: Low risk, simple
      - Negative: Admin bottleneck, slower payouts
      - Mitigation: Automate later with fraud checks (post-PMF)
    alternatives:
      - Stripe Connect: Automatic but complex setup, higher fraud risk in MVP

  - id: ADR-007
    title: Telegram Bot for MVP (Not Mobile App)
    date: "2025-12-27"
    status: Accepted
    context: |
      Need to launch fast. Options: Web app, Mobile app, Telegram bot
    decision: |
      Start with Telegram bot for MVP.
      Add web app in Phase 2, mobile apps in Phase 3.
    rationale:
      - Telegram bot fastest to build
      - YON community already on Telegram
      - No app store approval delays
      - Cross-platform (iOS, Android, Desktop)
    consequences:
      - Positive: Fast launch, low friction
      - Negative: Limited to Telegram users
      - Mitigation: Web app priority #1 after MVP validated
    alternatives:
      - Web app first: More universal but slower development
      - Mobile apps: Highest friction (stores, reviews, 2 platforms)

  - id: ADR-008
    title: Zoom for Video (Not Custom Solution)
    date: "2025-12-27"
    status: Accepted
    context: |
      Live practices need video conferencing.
      Options: Zoom API, Jitsi, Daily.co, Agora, custom WebRTC
    decision: |
      Use Zoom API for MVP.
      Generate meeting links via API, users click to join.
    rationale:
      - Zoom familiar to users and masters
      - Reliable, scales well
      - API mature and documented
    consequences:
      - Positive: Reliable, no video infrastructure to maintain
      - Negative: Dependency on Zoom, API limits unclear
      - Mitigation: Clarify Zoom limits, have backup (Jitsi) ready
    alternatives:
      - Jitsi: Open-source, self-hosted but quality concerns
      - Daily.co: Good but less familiar to users
      - Custom WebRTC: Too complex for MVP

  - id: ADR-009
    title: PostgreSQL + Redis (Not NoSQL)
    date: "2025-12-27"
    status: Accepted
    context: |
      Need database for relational data (users, practices, bookings).
      Need cache/queue for sessions, APScheduler, Celery.
    decision: |
      PostgreSQL 15+ for primary data.
      Redis 7+ for cache, sessions, task queue.
    rationale:
      - PostgreSQL: ACID, JSONB, mature, proven
      - Redis: Fast, simple, multi-purpose
      - Team familiar with both
    consequences:
      - Positive: Proven tech, good tooling, community
      - Negative: Not "cutting edge"
      - Mitigation: None needed, stability > novelty
    alternatives:
      - MongoDB: No need for document flexibility beyond JSONB
      - MySQL: PostgreSQL JSONB better

  - id: ADR-010
    title: Stripe for Payments (Not Custom)
    date: "2025-12-27"
    status: Accepted
    context: |
      Need to accept payments from users globally.
      Options: Stripe, PayPal, Square, custom integration
    decision: |
      Use Stripe for all payment processing.
      Webhooks for event handling.
    rationale:
      - Global coverage, multi-currency
      - Best developer experience
      - PCI compliance handled
      - Fraud detection built-in
    consequences:
      - Positive: Fast integration, secure, reliable
      - Negative: 2.9% + $0.30 fee (passed to users or absorbed)
      - Mitigation: Fee is industry standard
    alternatives:
      - PayPal: Lower trust with users, worse UX
      - Square: US-centric
      - Custom: PCI compliance nightmare

  - id: ADR-011
    title: Commission Only From Live Money
    date: "2026-02-06"
    status: Accepted
    context: |
      Two types of promo codes exist:
      - Company Promo: Company pays master from marketing budget
      - Master Promo: Master reduces own revenue
      Need to determine: when does platform take commission?
    decision: |
      Commission is charged only from money that user actually paid ("live money").

      Examples:
      - User pays $50 → Master gets $50 frozen → After practice: $42.50 available, $7.50 commission
      - User pays $0 (100% promo) → Master gets $50 (Company pays) → After practice: $50 available, $0 commission
      - User pays $25 (50% off) → Master gets $50 frozen → After practice: $46.25 available, $3.75 commission (15% of $25)

      Rule: Commission = 15% * (what user paid), not (practice price).
    rationale:
      - Fair: Company doesn't take commission from its own marketing budget
      - Simple: One rule for all scenarios
      - Anti-fraud space: Acknowledged but will address later when abuse detected
    consequences:
      - Positive: Fair economics, simple to understand
      - Negative: Opens door to potential abuse (fake Company Promos)
      - Mitigation: Admin approval for Company Promos, fraud detection later
    alternatives:
      - Commission from full price always: Unfair to company on Company Promos
      - Different rules per promo type: More complex, harder to explain

open_questions:
  - question: Master Promo commission calculation
    id: Q-001
    status: ✅ Resolved
    decision: Option A - Commission from live money (what user actually paid)
    date: "2026-02-06"
    rationale: |
      Master already reduces own revenue with promo.
      Fair to charge commission only from money user paid.
      See ADR-011 for details.
    impact: Low (affects only master promo edge case)

  - question: Minimum withdrawal amount
    id: Q-002
    status: Pending decision
    options:
      - A: $10 (low barrier)
      - B: $50 (recommended)
      - C: No limit
    recommendation: Option B ($50 to reduce transfer overhead)
    impact: Low (most masters earn >$50/month)

  - question: S3 provider
    id: Q-003
    status: Pending decision
    options:
      - A: AWS S3 + CloudFront
      - B: CloudFlare R2 + CDN
    recommendation: CloudFlare R2 (cheaper egress, simpler)
    impact: Medium (affects video storage costs)
    deadline: Week 8

  - question: K8s hosting
    id: Q-004
    status: Pending decision
    options:
      - A: AWS EKS
      - B: GCP GKE
      - C: DigitalOcean Kubernetes
    recommendation: DigitalOcean (simpler, cheaper for MVP)
    impact: Medium (affects ops complexity)
    deadline: Week 12

deprecated_decisions:
  - id: ADR-000
    title: Monolithic Architecture
    date: "2025-12-20"
    status: Superseded by ADR-001
    reason: |
      Initially considered monolith for speed.
      Decided microservices better for team scaling and future flexibility.

lessons_learned:
  - lesson: JSONB flexibility valuable for MVP
    date: "2025-12-27"
    context: |
      Using JSONB for credentials saved us from 3 migrations already.
      Telegram, Web, Discord support added without schema changes.

  - lesson: Double-entry prevents financial bugs
    date: "2026-02-05"
    context: |
      Had bug in early prototype where commission wasn't split correctly.
      Double-entry caught it immediately (sum != 0).
      Would've been disaster in production.

  - lesson: Manual withdrawal approval good for MVP
    date: "2026-02-05"
    context: |
      Considered Stripe Connect but complexity not worth it.
      Manual approval adds trust signal to masters anyway.

revenue_model:
  primary:
    - stream: Commission on Practice Sales
      rate: 15% of transaction (only from live money)
      mechanism: |
        User pays Master 100% → frozen
        After practice completes → unfrozen to available
        Master pays Company 15% commission from available
      volume_assumptions:
        - 1,000 masters (target year 1)
        - 10 practices/month per master
        - 5 participants per practice avg
        - $20 avg price per practice
      calculation: |
        Monthly GMV: 1,000 masters × 10 practices × 5 participants × $20 = $1,000,000
        Platform revenue (15%): $150,000/month = $1,800,000/year
      notes: |
        - No subscription fees for masters or users
        - Commission only on completed transactions
        - Commission only from live money (user actually paid)
        - Free practices = $0 commission
        - Frozen funds cannot be withdrawn until practice completes

  future_streams:
    - stream: Premium Master Features
      description: |
        Advanced analytics, white-label pages, priority support
      pricing: $50/month or 12% commission (vs 15%)
      target: 10% of masters upgrade
      potential: $5K/month year 1

    - stream: User Subscriptions
      description: |
        Unlimited access to specific masters or practice types
      pricing: $50-100/month
      target: 5% of active users
      potential: TBD (depends on user base size)

    - stream: Corporate Packages
      description: |
        B2B wellness programs for companies
      pricing: $5-10 per employee/month
      target: 50 companies by year 2
      potential: $25K-50K/month

    - stream: Referral Fees
      description: |
        Commission for referring new masters (1-2% of their GMV for 1 year)
      potential: Small in early years, scales later

    - stream: Data Insights
      description: |
        Anonymized wellness trends, research partnerships
      potential: Long-term, not MVP

cost_structure:
  fixed_costs:
    - item: Team Salaries
      amount: $50K/month
      breakdown:
        - Product Owner: $10K
        - Tech Lead: $12K
        - Backend Dev × 2: $18K
        - Frontend Dev: $8K
        - DevOps: $7K

    - item: Infrastructure (AWS/GCP)
      amount: $2K/month (MVP), $10K/month (scale)
      breakdown:
        - K8s cluster
        - RDS PostgreSQL
        - Redis
        - S3/CDN
        - Monitoring

    - item: Software Licenses
      amount: $1K/month
      breakdown:
        - Sentry, GitHub, Figma, Slack, etc.

    - item: Office/Admin
      amount: $2K/month
      notes: Remote-first, minimal office

  variable_costs:
    - item: Payment Processing (Stripe)
      rate: 2.9% + $0.30 per transaction
      notes: Passed through in practice price or absorbed

    - item: Zoom API
      cost: TBD (need to clarify limits/pricing)
      notes: May need Zoom Pro accounts per master

    - item: Customer Support
      cost: Scales with users
      estimate: $5K/month at 10K users

  total_monthly_burn:
    mvp_phase: $60K/month
    scale_phase: $80K/month (hiring more support)

unit_economics:
  per_practice_transaction:
    avg_practice_price: $20
    participants: 5
    gmv: $100
    platform_commission_15_percent: $15
    stripe_fee_2_9_percent: $2.90
    net_revenue: $12.10
    cogs: ~$0.50 (infrastructure, support)
    gross_profit: $11.60
    gross_margin: 77%

  per_master_ltv:
    assumptions:
      - Master stays 24 months (avg)
      - 10 practices/month
      - 5 participants/practice
      - $20 avg price
    calculation: |
      Monthly GMV per master: 10 × 5 × $20 = $1,000
      Monthly commission: $150
      LTV: $150 × 24 = $3,600
    cac_target: <$500 (7:1 LTV:CAC ratio)

  per_user_ltv:
    assumptions:
      - User stays 12 months (avg)
      - 4 practices/month
      - $20 avg price
    calculation: |
      Monthly spend: 4 × $20 = $80
      Monthly commission: $12
      LTV: $12 × 12 = $144
    cac_target: <$30 (5:1 LTV:CAC ratio)

pricing_strategy:
  commission:
    base_rate: 15%
    justification: |
      - Lower than Mindbody (20-30%)
      - Higher than pure payment (Stripe 2.9%)
      - Includes: scheduling, reminders, payments, analytics
      - Value: Masters save 5-10 hours/week

    comparison:
      mindbody: 20-30% + monthly fees
      calendly_stripe: 2.9% + $15/mo = ~8% effective
      velo: 15% all-in

  promo_codes:
    company_promo:
      economics: |
        Company pays master full 85%, absorbs discount as marketing cost
      use_case: User acquisition, seasonal campaigns

    master_promo:
      economics: |
        Master reduces own revenue (5%/25%/50%/75%/100% discount tiers)
        Commission calculated on discounted price (TBD: option A vs B)
      use_case: Offline payment already received, loyalty programs

  withdrawal:
    minimum: $50 (to reduce transaction overhead)
    fee: $0 (keep simple for MVP)
    frequency: On-demand (manual admin approval)

  future_tiered_pricing:
    - tier: Starter
      commission: 15%
      features: Standard
      target: New masters

    - tier: Pro
      commission: 12%
      monthly_fee: $50
      features: Advanced analytics, priority support
      target: High-volume masters (>$1K GMV/month)

    - tier: Enterprise
      commission: Custom (8-10%)
      features: White-label, dedicated account manager
      target: Studios, corporate programs

financial_projections:
  year_1:
    masters: 100 → 1,000
    practices_per_month: 5,000 → 10,000
    gmv: $100K → $1M per month
    revenue: $15K → $150K per month ($900K annual)
    burn: $60K/month = $720K annual
    net: -$180K (need funding or ramen profitable)

  year_2:
    masters: 1,000 → 5,000
    gmv: $1M → $5M per month
    revenue: $150K → $750K per month ($5.4M annual)
    burn: $80K/month = $960K annual
    net: +$4.4M (profitable)

  year_3:
    masters: 5,000 → 15,000
    gmv: $5M → $15M per month
    revenue: $750K → $2.25M per month ($18M annual)
    burn: $120K/month = $1.44M annual
    net: +$16.5M (strong profit)

  notes: |
    Assumes:
    - No major competitor disruption
    - VELO ecosystem provides initial user base
    - Retention: 70% masters, 60% users year-over-year
    - No major regulatory changes

funding_needs:
  bootstrapped_scenario:
    - Start with 10 beta masters (VELO community)
    - Grow organically via referrals
    - Ramen profitable by month 12
    - No external funding needed

  seed_round_scenario:
    amount: $500K
    use:
      - 6 months runway: $360K
      - Marketing/acquisition: $100K
      - Infrastructure: $20K
      - Buffer: $20K
    milestones:
      - 500 masters
      - $250K GMV/month
      - Clear PMF (NPS >40)

  series_a_scenario:
    amount: $3M (if scaling aggressively)
    use:
      - Team expansion (10 → 25 people)
      - Sales team (B2B corporate)
      - Mobile apps
      - International expansion
    milestones:
      - 5,000 masters
      - $5M GMV/month
      - $750K revenue/month

key_metrics:
  growth:
    - Masters onboarded per month
    - Practices hosted per month
    - GMV (Gross Merchandise Value)
    - Active users (attended >1 practice in 30 days)

  financial:
    - Revenue (commission)
    - Gross margin
    - Burn rate
    - Runway (months)
    - LTV:CAC ratio

  engagement:
    - Master retention (12-month)
    - User retention (12-month)
    - Practices per master per month
    - Practices per user per month
    - Fill rate (participants / capacity)

  quality:
    - NPS (masters and users)
    - Support ticket volume
    - Payment success rate
    - Zoom uptime
    - Bug count

risks_financial:
  - risk: Slow master adoption
    impact: Revenue << projections
    mitigation: Seed with VELO community, aggressive referral program

  - risk: High payment fraud
    impact: Chargebacks eat into margin
    mitigation: Stripe Radar, manual review for large transactions

  - risk: Zoom API cost spike
    impact: COGS increase, margin compression
    mitigation: Negotiate volume pricing, consider alternatives (Jitsi, Daily.co)

  - risk: Regulatory (payment licensing)
    impact: Legal fees, delays
    mitigation: Stripe handles most, consult lawyer early

  - risk: Competition from incumbent (Mindbody)
    impact: Hard to acquire masters
    mitigation: Niche focus (live groups + state tracking), better UX

exit_scenarios:
  - scenario: Acquisition by wellness platform
    examples: Mindbody, ClassPass, Headspace
    valuation: 3-5x revenue ($15M-$30M at $6M ARR)
    timeline: 3-5 years

  - scenario: Strategic acquisition by wellness platform
    rationale: Integrate into VELO ecosystem
    valuation: 2-4x revenue
    timeline: 2-3 years

  - scenario: Continue as profitable business
    rationale: Strong cash flow, no need to exit
    potential: $5-10M annual profit at scale

  - scenario: IPO
    rationale: Large market, defensible moat
    timeline: 7-10 years (unlikely for this market size)

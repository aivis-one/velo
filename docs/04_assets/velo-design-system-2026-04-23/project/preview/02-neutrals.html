<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box;}
  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .sw{width:calc((100% - 64px)/9); aspect-ratio:1/1.1; border-radius:8px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px; box-sizing:border-box; box-shadow: inset 0 0 0 1px rgba(30,40,55,0.06); font-size:9px; line-height:1.2;}
  .sw .n{font-size:10px; opacity:0.9;}
  .sw .h{opacity:0.7;}
  .cap{color:var(--text-secondary); font-size:12px; margin-top:14px;}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#fff; color:#4C6589;"><span class="n">white</span><span class="h">#FFFFFF</span></div>
    <div class="sw" style="background:#F5F7FA; color:#4C6589;"><span class="n">50</span><span class="h">#F5F7FA</span></div>
    <div class="sw" style="background:#E2F0FD; color:#4C6589;"><span class="n">100</span><span class="h">#E2F0FD</span></div>
    <div class="sw" style="background:#D6E1EF; color:#4C6589;"><span class="n">200</span><span class="h">#D6E1EF</span></div>
    <div class="sw" style="background:#B0BCCD; color:#fff;"><span class="n">300</span><span class="h">#B0BCCD</span></div>
    <div class="sw" style="background:#98A3B4; color:#fff;"><span class="n">400</span><span class="h">#98A3B4</span></div>
    <div class="sw" style="background:#7F8B9B; color:#fff;"><span class="n">500</span><span class="h">#7F8B9B</span></div>
    <div class="sw" style="background:#677282; color:#fff;"><span class="n">600</span><span class="h">#677282</span></div>
    <div class="sw" style="background:#4F5969; color:#fff;"><span class="n">700</span><span class="h">#4F5969</span></div>
  </div>
  <div class="row" style="margin-top:8px;">
    <div class="sw" style="background:#364150; color:#fff;"><span class="n">800</span><span class="h">#364150</span></div>
    <div class="sw" style="background:#1E2837; color:#fff;"><span class="n">900</span><span class="h">#1E2837</span></div>
    <div class="sw" style="background:#141C2A; color:#fff;"><span class="n">950</span><span class="h">#141C2A</span></div>
    <div class="sw" style="background:#0B111C; color:#fff;"><span class="n">black</span><span class="h">#0B111C</span></div>
  </div>
  <div class="cap">13-step warm blue-grey neutral scale · white → #0B111C</div>
</div>
</body></html>

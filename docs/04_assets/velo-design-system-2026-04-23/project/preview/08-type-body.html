<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box; color:var(--text-primary);}
  .row{display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid #F0F3F8;}
  .row:last-child{border:0;}
  .tag{flex:0 0 108px; font-size:10px; color:var(--text-muted); letter-spacing:0.04em; text-transform:uppercase;}
  .spec{flex:1;}
  .meta{flex:0 0 80px; font-size:10px; color:var(--text-muted); text-align:right;}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="tag">Body/Large</div><div class="spec" style="font:400 16px/24px var(--font-display); color:var(--text-secondary);">Запишитесь на ближайшую сессию, и она появится здесь.</div><div class="meta">16 / 24</div></div>
  <div class="row"><div class="tag">Body/Default</div><div class="spec" style="font:400 14px/20px var(--font-display); color:var(--text-secondary);">Посетили 3 практики на этой неделе · 45 мин</div><div class="meta">14 / 20</div></div>
  <div class="row"><div class="tag">Body/Small</div><div class="spec" style="font:400 12px/18px var(--font-display); color:var(--text-secondary);">Alex Mindful · 45 мин · рекомендовано</div><div class="meta">12 / 18</div></div>
  <div class="row"><div class="tag">Label</div><div class="spec" style="font:400 15px/20px var(--font-display);">Попробовать бесплатно</div><div class="meta">15 / 20</div></div>
  <div class="row"><div class="tag">Caption</div><div class="spec" style="font:400 9px/14px var(--font-display); letter-spacing:0.02em; color:var(--text-muted); text-transform:uppercase;">Пн · Вт · Ср · Чт · Пт · Сб · Вс</div><div class="meta">9 / 14</div></div>
</div>
</body></html>

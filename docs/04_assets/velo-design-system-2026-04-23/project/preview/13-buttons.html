<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:22px 24px; box-sizing:border-box; display:flex; flex-direction:column; gap:14px;}
  .row{display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font:400 16px/1 var(--font-display); padding:12px 24px; min-height:44px;
    border:0; border-radius:200px; cursor:pointer;}
  .primary{background:#627A9C; color:#fff; box-shadow:0 0 20px 7px rgba(255,255,255,1);}
  .secondary{background:#E2F0FD; color:#4C6589;}
  .outline{background:transparent; color:#4C6589; box-shadow:inset 0 0 0 1.5px #B0BCCD;}
  .ghost{background:transparent; color:#2F9EA8;}
  .disabled{background:#627A9C; color:#fff; opacity:0.4;}
  .lbl{font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; width:90px; display:inline-block;}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="lbl">Primary</span>
    <button class="btn primary">Попробовать</button>
    <button class="btn primary">Найти практику</button>
    <button class="btn disabled">Disabled</button>
  </div>
  <div class="row"><span class="lbl">Secondary</span>
    <button class="btn secondary">Все практики</button>
    <button class="btn outline">Отменить</button>
    <button class="btn ghost">Забыли пароль?</button>
  </div>
</div>
</body></html>

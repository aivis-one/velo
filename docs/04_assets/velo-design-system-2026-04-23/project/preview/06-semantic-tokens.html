<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box; display:flex; gap:16px;}
  .pane{flex:1; padding:16px; border-radius:15px;}
  .pane.light{background:#fff; box-shadow:0 4px 12px rgba(30,40,55,0.06);}
  .pane.dark{background:#141C2A; color:#fff;}
  .row{display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(128,128,128,0.12); font-size:13px;}
  .row:last-child{border:0;}
  .row .name{font-size:12px; opacity:0.8;}
  .sw{width:54px; height:20px; border-radius:4px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);}
  h3{font-size:12px; margin:0 0 8px; opacity:0.7; font-weight:400; letter-spacing:0.04em; text-transform:uppercase;}
</style></head><body>
<div class="wrap">
  <div class="pane light">
    <h3>Light — surface/text</h3>
    <div class="row"><span class="name">surface/default</span><span class="sw" style="background:#fff;"></span></div>
    <div class="row"><span class="name">surface/subtle</span><span class="sw" style="background:#F5F7FA;"></span></div>
    <div class="row"><span class="name">text/primary</span><span class="sw" style="background:#4C6589;"></span></div>
    <div class="row"><span class="name">text/secondary</span><span class="sw" style="background:#677282;"></span></div>
    <div class="row"><span class="name">accent/teal</span><span class="sw" style="background:#2F9EA8;"></span></div>
    <div class="row"><span class="name">border/default</span><span class="sw" style="background:#E2F0FD;"></span></div>
  </div>
  <div class="pane dark">
    <h3>Dark — surface/text</h3>
    <div class="row"><span class="name">surface/default</span><span class="sw" style="background:#141C2A;"></span></div>
    <div class="row"><span class="name">surface/subtle</span><span class="sw" style="background:#1E2837;"></span></div>
    <div class="row"><span class="name">text/primary</span><span class="sw" style="background:#fff;"></span></div>
    <div class="row"><span class="name">text/secondary</span><span class="sw" style="background:#98A3B4;"></span></div>
    <div class="row"><span class="name">accent/teal</span><span class="sw" style="background:#76DDE6;"></span></div>
    <div class="row"><span class="name">border/default</span><span class="sw" style="background:#364150;"></span></div>
  </div>
</div>
</body></html>

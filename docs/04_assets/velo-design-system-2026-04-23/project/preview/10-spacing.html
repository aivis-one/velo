<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box;}
  .row{display:flex; align-items:flex-end; gap:18px;}
  .item{display:flex; flex-direction:column; align-items:flex-start; gap:6px; flex:1;}
  .bar{background:#2F9EA8; height:22px; border-radius:3px;}
  .n{font-size:11px; color:var(--text-secondary);}
  .n strong{color:var(--text-primary); font-weight:400; display:block; font-size:13px;}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;"></div><div class="n"><strong>xs</strong>4px</div></div>
    <div class="item"><div class="bar" style="width:8px;"></div><div class="n"><strong>sm</strong>8px</div></div>
    <div class="item"><div class="bar" style="width:16px;"></div><div class="n"><strong>md</strong>16px</div></div>
    <div class="item"><div class="bar" style="width:24px;"></div><div class="n"><strong>lg</strong>24px</div></div>
    <div class="item"><div class="bar" style="width:32px;"></div><div class="n"><strong>xl</strong>32px</div></div>
    <div class="item"><div class="bar" style="width:48px;"></div><div class="n"><strong>2xl</strong>48px</div></div>
    <div class="item"><div class="bar" style="width:64px;"></div><div class="n"><strong>3xl</strong>64px</div></div>
    <div class="item"><div class="bar" style="width:96px;"></div><div class="n"><strong>4xl</strong>96px</div></div>
  </div>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box;}
  .row{display:flex; gap:10px; margin-bottom:12px;}
  .sw{flex:1; height:80px; border-radius:10px; display:flex; flex-direction:column; justify-content:space-between; padding:10px 12px; box-sizing:border-box; box-shadow: inset 0 0 0 1px rgba(30,40,55,0.06); font-size:11px;}
  .sw .n{font-size:13px; letter-spacing:-0.005em;}
  .sw .h{opacity:0.8; font-size:10px;}
  .cap{color:var(--text-secondary); font-size:12px;}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#4C6589; color:#fff;"><span class="n">steel / primary</span><span class="h">#4C6589 · text + brand</span></div>
    <div class="sw" style="background:#627A9C; color:#fff;"><span class="n">steel / button</span><span class="h">#627A9C · filled CTA</span></div>
    <div class="sw" style="background:#ABBFDA; color:#1E2837;"><span class="n">steel / muted</span><span class="h">#ABBFDA</span></div>
  </div>
  <div class="cap">Steel — primary brand family. Warm grey-blue. Text, headings, filled buttons.</div>
</div>
</body></html>

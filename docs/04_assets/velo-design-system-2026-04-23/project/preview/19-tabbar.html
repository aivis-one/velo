<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box;}
  .tabbar{display:flex; align-items:center; justify-content:space-around; background:#fff; border-radius:200px; padding:6px; box-shadow:0 0 20px 7px rgba(255,255,255,1), 0 4px 12px rgba(30,40,55,0.08); border:1px solid #E2F0FD; width:360px; margin:0 auto;}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 4px; border-radius:200px; color:#98A3B4; font-size:10px;}
  .tab.active{background:#E2F0FD; color:#4C6589;}
  .tab.accent.active{background:#2F9EA8; color:#fff;}
  .tab svg{width:20px; height:20px;}
  .cap{text-align:center; font-size:11px; color:var(--text-secondary); margin-top:14px;}
</style></head><body>
<div class="wrap">
  <div class="tabbar">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10 12 3l9 7v11a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1z"/></svg>
      Главная
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      Поиск
    </div>
    <div class="tab accent active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Начать
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Дневник
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      Профиль
    </div>
  </div>
  <div class="cap">Tab bar · pill shape · always with shadow-glow-white halo</div>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box;}
  .row{display:flex; gap:10px; margin-bottom:12px;}
  .sw{flex:1; height:80px; border-radius:10px; display:flex; flex-direction:column; justify-content:space-between; padding:10px 12px; box-sizing:border-box; box-shadow: inset 0 0 0 1px rgba(30,40,55,0.06); font-size:11px;}
  .sw .n{font-size:13px;}
  .sw .h{opacity:0.8; font-size:10px;}
  .cap{color:var(--text-secondary); font-size:12px;}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#D6F5F8; color:#1E5A60;"><span class="n">teal / 100</span><span class="h">#D6F5F8</span></div>
    <div class="sw" style="background:#76DDE6; color:#1E5A60;"><span class="n">teal / primary</span><span class="h">#76DDE6 · dark accent</span></div>
    <div class="sw" style="background:#2F9EA8; color:#fff;"><span class="n">teal / 500</span><span class="h">#2F9EA8 · light CTA</span></div>
    <div class="sw" style="background:#26767D; color:#fff;"><span class="n">teal / 700</span><span class="h">#26767D · text</span></div>
    <div class="sw" style="background:#1E5A60; color:#fff;"><span class="n">teal / 800</span><span class="h">#1E5A60</span></div>
  </div>
  <div class="cap">Teal — the accent. Active tabs, links, success. Light uses 500, dark uses primary.</div>
</div>
</body></html>

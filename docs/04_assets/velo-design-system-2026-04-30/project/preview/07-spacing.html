<!doctype html><html><head><meta charset="utf-8"><title>Spacing — 4pt grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px 24px;background:var(--bg);font-family:var(--font-display);color:var(--velo-ink)}
  .row{display:flex;align-items:center;gap:16px;padding:6px 0}
  .label{font-size:12px;color:var(--velo-ink-mute);width:60px;letter-spacing:.04em}
  .bar{height:14px;background:var(--velo-ink);border-radius:3px}
  .val{font-size:13px;color:var(--velo-ink-mute);margin-left:8px}
</style></head><body>
  <div class="row"><div class="label">s-1</div><div class="bar" style="width:4px"></div><div class="val">4 px</div></div>
  <div class="row"><div class="label">s-2</div><div class="bar" style="width:8px"></div><div class="val">8 px</div></div>
  <div class="row"><div class="label">s-4</div><div class="bar" style="width:16px"></div><div class="val">16 px · gap between groups</div></div>
  <div class="row"><div class="label">s-6</div><div class="bar" style="width:24px"></div><div class="val">24 px · card padding</div></div>
  <div class="row"><div class="label">s-8</div><div class="bar" style="width:32px"></div><div class="val">32 px · section gap</div></div>
</body></html>

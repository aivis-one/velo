<!doctype html><html><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:var(--bg);font-family:var(--font-display);color:var(--velo-ink)}
  .row{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--velo-line-soft)}
  .row:last-child{border:0}
  .size{font-size:11px;color:var(--velo-ink-mute);width:70px;flex-shrink:0;letter-spacing:.04em}
  .sample{line-height:1;letter-spacing:.02em}
</style></head><body>
  <div class="row"><div class="size">48 / DISPLAY</div><div class="sample" style="font-size:36px">VELΘ</div></div>
  <div class="row"><div class="size">32 / H1</div><div class="sample" style="font-size:28px">156 практик</div></div>
  <div class="row"><div class="size">28 / H2</div><div class="sample" style="font-size:24px">С возвращением!</div></div>
  <div class="row"><div class="size">18 / H3</div><div class="sample" style="font-size:18px">Утренняя медитация</div></div>
  <div class="row"><div class="size">14 / META</div><div class="sample" style="font-size:14px;color:var(--velo-ink-mute)">Завтра, 07:00 · 45 мин</div></div>
</body></html>

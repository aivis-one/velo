<!doctype html><html><head><meta charset="utf-8"><title>Color — Alpha System</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-display);color:var(--velo-ink)}
  h1{font-size:20px;margin:0 0 4px;font-weight:400}
  .lbl{font-size:13px;color:var(--velo-ink-mute);margin-bottom:18px}

  .stack{display:flex;flex-direction:column;gap:12px;max-width:560px}
  .row{
    display:grid;grid-template-columns:160px 1fr 160px;
    align-items:center;gap:16px;
  }
  /* Checkerboard so alpha is visible */
  .chip{
    height:44px;border-radius:10px;position:relative;overflow:hidden;
    background-image:
      linear-gradient(45deg,#cfd6e3 25%,transparent 25%),
      linear-gradient(-45deg,#cfd6e3 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#cfd6e3 75%),
      linear-gradient(-45deg,transparent 75%,#cfd6e3 75%);
    background-size:14px 14px;
    background-position:0 0,0 7px,7px -7px,7px 0;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
  }
  .chip::after{content:"";position:absolute;inset:0;border-radius:inherit}

  .chip.s100::after{background:var(--velo-ink)}
  .chip.s70::after {background:var(--velo-ink-faint)}
  .chip.s18::after {background:var(--velo-line)}
  .chip.s15::after {background:var(--velo-ink-ghost)}

  .label{font-size:14px}
  code{font-family:ui-monospace,monospace;font-size:11px;color:var(--velo-ink-mute);text-align:right}
</style></head><body>
  <h1>Alpha system</h1>
  <div class="lbl">Hierarchy is built from alpha of <code style="color:var(--velo-ink)">#4C6589</code> — not new colors.</div>
  <div class="stack">
    <div class="row"><div class="chip s100"></div><span class="label">100% — text, icons</span><code>#4C6589</code></div>
    <div class="row"><div class="chip s70"></div><span class="label">70% — timestamps, secondary text</span><code>rgba(76,101,137,.7)</code></div>
    <div class="row"><div class="chip s18"></div><span class="label">18% — hairlines, dividers</span><code>rgba(76,101,137,.18)</code></div>
    <div class="row"><div class="chip s15"></div><span class="label">15% — glass chip fill</span><code>rgba(76,101,137,.15)</code></div>
  </div>
</body></html>

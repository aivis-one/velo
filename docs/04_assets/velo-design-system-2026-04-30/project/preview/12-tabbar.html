<!doctype html><html><head><meta charset="utf-8"><title>Tab Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:30px;background:linear-gradient(180deg,var(--velo-bg),#fff);display:flex;justify-content:center;align-items:center;height:152px;box-sizing:border-box;font-family:var(--font-display)}
  .bar{display:flex;gap:25px}
  .tab{
    width:63px;height:63px;border-radius:50%;
    background:rgba(98,122,156,.15);border:1.26px solid #fff;
    backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
    display:flex;align-items:center;justify-content:center;color:var(--velo-ink);
  }
  .tab.active{box-shadow:0 0 26px 8px rgba(255,255,255,.85)}
  .tab svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
</style></head><body>
  <div class="bar">
    <div class="tab active" aria-label="Home">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    </div>
    <div class="tab" aria-label="Calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
    </div>
    <div class="tab" aria-label="List">
      <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    </div>
    <div class="tab" aria-label="Profile">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
    </div>
  </div>
</body></html>

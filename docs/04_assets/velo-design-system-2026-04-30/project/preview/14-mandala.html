<!doctype html><html><head><meta charset="utf-8"><title>Mandala Motif</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{
    margin:0;padding:0;
    background:var(--velo-bg);
    min-height:520px;font-family:var(--font-display);color:var(--velo-ink);
  }
  h2{font-size:13px;color:var(--velo-ink-mute);letter-spacing:.06em;margin:18px 24px 6px;text-transform:uppercase;font-weight:400}

  /* ---- Hero: full emblem (mandala + wordmark are baked into the SVG) ---- */
  .hero{
    height:340px;display:flex;align-items:center;justify-content:center;position:relative;
  }
  .emblem{width:300px;height:300px;background:url("../assets/brand/velo-emblem.svg") center/contain no-repeat}

  /* ---- Atmospheric variants (mandala-mask used as background motif) ---- */
  .grid{display:flex;height:200px;border-top:1px solid var(--velo-line-soft);background:rgba(255,255,255,.35)}
  .col{flex:1;display:flex;align-items:center;justify-content:center;position:relative;border-right:1px solid var(--velo-line-soft)}
  .col:last-child{border:0}
  .lbl{position:absolute;bottom:10px;font-size:12px;color:var(--velo-ink-mute);letter-spacing:.04em}
  .m{width:140px;height:140px;background:url("../assets/brand/mandala-mask.svg") center/contain no-repeat}
  .m.s100{opacity:1}
  .m.s50{opacity:.5}
  .m.s12{opacity:.12}
</style></head><body>

  <h2>Brand Emblem · welcome screen</h2>
  <div class="hero">
    <div class="emblem"></div>
  </div>

  <h2>Mandala Mask · atmospheric motif</h2>
  <div class="grid">
    <div class="col"><div class="m s100"></div><div class="lbl">100% — solid</div></div>
    <div class="col"><div class="m s50"></div><div class="lbl">50% — feature</div></div>
    <div class="col"><div class="m s12"></div><div class="lbl">12% — atmospheric (in use)</div></div>
  </div>

</body></html>

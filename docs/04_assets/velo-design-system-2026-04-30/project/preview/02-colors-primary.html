<!doctype html><html><head><meta charset="utf-8"><title>Color — Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-display)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .swatch{aspect-ratio:1.4;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;font-size:12px;line-height:1.3;box-shadow:inset 0 0 0 1px rgba(76,101,137,.10)}
  .swatch.light{color:var(--velo-ink)}
  .name{font-size:13px;margin-bottom:2px}
  .hex{opacity:.85;letter-spacing:.04em}
</style></head><body>
  <div class="row">
    <div class="swatch" style="background:var(--velo-ink)"><div class="name">Ink</div><div class="hex">#4C6589</div></div>
    <div class="swatch" style="background:var(--velo-ink-soft)"><div class="name">Ink Soft</div><div class="hex">#627A9C</div></div>
    <div class="swatch" style="background:var(--velo-ink-mute)"><div class="name">Ink Mute</div><div class="hex">#8293AC</div></div>
    <div class="swatch light" style="background:var(--velo-bg)"><div class="name">Sky</div><div class="hex">#E8F0FF</div></div>
    <div class="swatch light" style="background:var(--velo-bg-tint)"><div class="name">Sky Tint</div><div class="hex">#E2F0FD</div></div>
  </div>
</body></html>

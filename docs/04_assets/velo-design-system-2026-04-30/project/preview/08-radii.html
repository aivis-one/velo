<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--bg);font-family:var(--font-display);color:var(--velo-ink);display:flex;gap:18px;align-items:flex-end;height:152px;box-sizing:border-box}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .shape{background:#fff;box-shadow:0 4px 14px rgba(76,101,137,.10), inset 0 0 0 1px rgba(76,101,137,.08)}
  .lbl{font-size:12px;color:var(--velo-ink-mute);letter-spacing:.04em}
  .name{font-size:14px}
</style></head><body>
  <div class="item"><div class="shape" style="width:80px;height:80px;border-radius:5px"></div><div class="name">Chip</div><div class="lbl">5px</div></div>
  <div class="item"><div class="shape" style="width:80px;height:80px;border-radius:15px"></div><div class="name">Card</div><div class="lbl">15px · signature</div></div>
  <div class="item"><div class="shape" style="width:140px;height:50px;border-radius:200px"></div><div class="name">Pill</div><div class="lbl">Button / Input · 200px</div></div>
  <div class="item"><div class="shape" style="width:60px;height:60px;border-radius:50%"></div><div class="name">Circle</div><div class="lbl">Avatar · 50%</div></div>
</body></html>

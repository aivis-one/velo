<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;font-family:var(--font-display);color:var(--velo-ink)}

  /* shared card chrome */
  .card{
    background:#fff;border-radius:18px;
    box-shadow:0 6px 22px rgba(76,101,137,.08), 0 1px 2px rgba(76,101,137,.04);
    box-sizing:border-box;
  }

  /* ---- Booking card ---- */
  .booking{
    width:336px;padding:18px 18px 16px;
    display:flex;flex-direction:column;gap:14px;
  }
  .booking-head{display:flex;align-items:center;gap:12px}
  .avatar{
    width:44px;height:44px;border-radius:50%;
    border:1.5px solid var(--velo-ink);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    color:var(--velo-ink);
  }
  .booking-title{font-size:17px;letter-spacing:.02em;line-height:1.2}
  .booking-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .meta{font-size:13px;color:var(--velo-ink-faint);display:inline-flex;align-items:center;gap:6px;letter-spacing:.01em}
  .meta svg{flex-shrink:0}
  .chip{
    background:var(--velo-mint-soft);color:var(--velo-mint-deep);
    font-size:13px;padding:4px 10px;border-radius:6px;letter-spacing:.02em;
    display:inline-flex;align-items:center;gap:5px;margin-left:auto;
  }

  /* ---- Stats card ---- */
  .stats{
    width:336px;padding:20px 24px;
    display:grid;grid-template-columns:1fr 1px 1fr;align-items:center;gap:0;
  }
  .divider{height:42px;background:var(--velo-line-soft);justify-self:center}
  .stat{display:flex;flex-direction:column;align-items:center;gap:4px}
  .stat .num{font-size:30px;line-height:1;letter-spacing:.01em}
  .stat .lbl{font-size:13px;color:var(--velo-ink-mute);letter-spacing:.02em}
</style></head><body>

  <div class="card booking">
    <div class="booking-head">
      <div class="avatar" aria-hidden="true">
        <!-- sun glyph -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/>
        </svg>
      </div>
      <div class="booking-title">Утренняя медитация</div>
    </div>
    <div class="booking-meta">
      <span class="meta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/>
        </svg>
        Завтра, 07:00
      </span>
      <span class="meta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
        </svg>
        45 мин
      </span>
      <span class="chip">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12l4 4 10-10"/>
        </svg>
        Оплачено
      </span>
    </div>
  </div>

  <div class="card stats">
    <div class="stat"><div class="num">156</div><div class="lbl">Практик</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="num">89</div><div class="lbl">Отзывов</div></div>
  </div>

</body></html>

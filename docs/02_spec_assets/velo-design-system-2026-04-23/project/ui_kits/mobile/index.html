<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>VELO Mobile UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#ECEFF4; font-family: var(--font-display); overflow:hidden; }
  [data-theme="dark"] body { background:#0b111c; }

  /* Stage: center the phone, letterbox on small viewports */
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; box-sizing: border-box;
  }
  /* iPhone-ish frame; status bar + home indicator simulated */
  .phone {
    position: relative;
    width: 390px; height: 844px;
    background: #000;
    border-radius: 44px;
    box-shadow: 0 40px 80px rgba(30,40,55,0.25), 0 12px 24px rgba(30,40,55,0.15);
    padding: 12px;
    box-sizing: content-box;
    flex: 0 0 auto;
  }
  .phone-screen {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 36px;
    overflow: hidden;
    background: var(--surface-default);
  }
  /* Dynamic island */
  .island {
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000; border-radius: 20px;
    z-index: 20; pointer-events: none;
  }
  /* Status bar text */
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px 0;
    font-size: 15px; color: var(--text-primary);
    z-index: 10; pointer-events: none;
    box-sizing: border-box;
  }
  .statusbar .icons { display: inline-flex; gap: 5px; align-items: center; }
  .statusbar svg { display: block; }
  /* Home indicator */
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 140px; height: 5px;
    background: var(--text-primary); opacity: 0.3;
    border-radius: 999px; z-index: 20;
  }

  /* Scale-down on smaller viewports */
  @media (max-height: 900px) {
    .phone { transform: scale(0.92); transform-origin: center; }
  }
  @media (max-height: 800px) {
    .phone { transform: scale(0.82); }
  }
  @media (max-height: 720px) {
    .phone { transform: scale(0.72); }
  }

  /* Button reset — hover/press handled via filter */
  button { font-family: inherit; }
  .velo-btn:hover:not(:disabled) { filter: brightness(1.06); }
  .velo-btn:active:not(:disabled) { transform: scale(0.98); filter: brightness(0.96); }

  /* Hide scrollbars inside the phone */
  .phone-screen *::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>

<div class="stage">
  <div class="phone">
    <div class="phone-screen">
      <div class="island"></div>
      <div class="statusbar">
        <span>9:41</span>
        <span class="icons">
          <!-- signal -->
          <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="6" rx="0.5"/><rect x="9" y="3" width="3" height="8" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></svg>
          <!-- wifi -->
          <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 10.7a1.3 1.3 0 1 0 0-2.6 1.3 1.3 0 0 0 0 2.6zM7.5 4.7A7 7 0 0 0 2.6 6.7a.6.6 0 0 0 0 .9l.6.6a.6.6 0 0 0 .8 0 4.6 4.6 0 0 1 6.9 0 .6.6 0 0 0 .8 0l.6-.6a.6.6 0 0 0 0-.9 7 7 0 0 0-4.8-2z M7.5 0A11.6 11.6 0 0 0 .2 2.6a.6.6 0 0 0 0 .9l.6.6a.6.6 0 0 0 .8 0 9.3 9.3 0 0 1 11.8 0 .6.6 0 0 0 .8 0l.6-.6a.6.6 0 0 0 0-.9A11.6 11.6 0 0 0 7.5 0z"/></svg>
          <!-- battery -->
          <svg width="26" height="11" viewBox="0 0 26 11" fill="none"><rect x="0.5" y="0.5" width="22" height="10" rx="2.5" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="19" height="7" rx="1.5" fill="currentColor"/><rect x="23.5" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" fill-opacity="0.4"/></svg>
        </span>
      </div>
      <div id="root" style="position:absolute; inset:0;"></div>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>

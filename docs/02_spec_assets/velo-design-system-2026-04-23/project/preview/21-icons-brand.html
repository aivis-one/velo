<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box;}
  .row{display:grid; grid-template-columns:repeat(6, 1fr); gap:14px 10px; align-items:center;}
  .ico{display:flex; flex-direction:column; align-items:center; gap:4px;}
  .ico img{width:44px; height:44px; object-fit:contain;}
  .ico .n{font-size:10px; color:var(--text-muted); text-align:center; letter-spacing:0.02em;}
  .cap{font-size:11px; color:var(--text-secondary); margin-top:14px; text-align:center;}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="ico"><img src="../assets/brand-icons/meditation.png"><div class="n">meditation</div></div>
    <div class="ico"><img src="../assets/brand-icons/spa.png"><div class="n">spa</div></div>
    <div class="ico"><img src="../assets/brand-icons/brain.png"><div class="n">brain</div></div>
    <div class="ico"><img src="../assets/brand-icons/flame.png"><div class="n">flame</div></div>
    <div class="ico"><img src="../assets/brand-icons/wind.png"><div class="n">wind</div></div>
    <div class="ico"><img src="../assets/brand-icons/bolt.png"><div class="n">bolt</div></div>
    <div class="ico"><img src="../assets/brand-icons/heart.png"><div class="n">heart</div></div>
    <div class="ico"><img src="../assets/brand-icons/high-five.png"><div class="n">high-five</div></div>
    <div class="ico"><img src="../assets/brand-icons/love.png"><div class="n">love</div></div>
    <div class="ico"><img src="../assets/brand-icons/quill-pen.png"><div class="n">quill-pen</div></div>
    <div class="ico"><img src="../assets/brand-icons/quill-pen-story.png"><div class="n">quill-pen-story</div></div>
    <div class="ico"><img src="../assets/brand-icons/circle-microphone.png"><div class="n">circle-microphone</div></div>
  </div>
  <div class="cap">12 brand wellness icons · single filled silhouette style</div>
</div>
</body></html>

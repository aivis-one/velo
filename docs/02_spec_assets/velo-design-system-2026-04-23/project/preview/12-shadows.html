<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F5F7FA;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:28px 24px; box-sizing:border-box; display:flex; gap:16px; justify-content:space-between;}
  .box{flex:1; height:100px; background:#fff; border-radius:12px; display:flex; align-items:flex-end; padding:10px 12px; font-size:11px; color:var(--text-secondary);}
  .box strong{color:var(--text-primary); font-weight:400; display:block; font-size:13px;}
  .sm  {box-shadow: 0 1px 2px rgba(30,40,55,0.04), 0 1px 1px rgba(30,40,55,0.04);}
  .md  {box-shadow: 0 4px 12px rgba(30,40,55,0.06), 0 2px 4px rgba(30,40,55,0.04);}
  .lg  {box-shadow: 0 12px 28px rgba(30,40,55,0.08), 0 4px 8px rgba(30,40,55,0.05);}
  .xl  {box-shadow: 0 24px 48px rgba(30,40,55,0.10), 0 8px 16px rgba(30,40,55,0.06);}
  .xxl {box-shadow: 0 40px 80px rgba(30,40,55,0.14), 0 12px 24px rgba(30,40,55,0.08);}
  .glow{box-shadow: 0 0 20px 7px rgba(255,255,255,1); background:#627A9C; color:#fff;}
  .glow strong{color:#fff;}
</style></head><body>
<div class="wrap">
  <div class="box sm"><div><strong>sm</strong>row lift</div></div>
  <div class="box md"><div><strong>md</strong>card</div></div>
  <div class="box lg"><div><strong>lg</strong>sticky</div></div>
  <div class="box xl"><div><strong>xl</strong>popover</div></div>
  <div class="box xxl"><div><strong>2xl</strong>modal</div></div>
  <div class="box glow"><div><strong>glow-white</strong>CTA halo</div></div>
</div>
</body></html>

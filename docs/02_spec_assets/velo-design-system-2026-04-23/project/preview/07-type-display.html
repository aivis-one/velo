<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box; color:var(--text-primary);}
  .row{display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid #F0F3F8;}
  .row:last-child{border:0;}
  .tag{flex:0 0 108px; font-size:10px; color:var(--text-muted); letter-spacing:0.04em; text-transform:uppercase;}
  .spec{flex:1;}
  .meta{flex:0 0 80px; font-size:10px; color:var(--text-muted); text-align:right;}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="tag">Display/Large</div><div class="spec" style="font:400 32px/40px var(--font-display);">Спокойствие</div><div class="meta">32 / 40</div></div>
  <div class="row"><div class="tag">Display/Small</div><div class="spec" style="font:400 24px/32px var(--font-display);">Доброе утро, Алина</div><div class="meta">24 / 32</div></div>
  <div class="row"><div class="tag">H1</div><div class="spec" style="font:400 20px/28px var(--font-display);">Ближайшая практика</div><div class="meta">20 / 28</div></div>
  <div class="row"><div class="tag">H2</div><div class="spec" style="font:400 18px/24px var(--font-display);">Утренняя медитация</div><div class="meta">18 / 24</div></div>
  <div class="row"><div class="tag">H3</div><div class="spec" style="font:400 16px/22px var(--font-display);">Начните с дыхания</div><div class="meta">16 / 22</div></div>
</div>
</body></html>

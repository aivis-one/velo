<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .wrap{width:700px; padding:24px; box-sizing:border-box; display:flex; align-items:center; gap:24px; color:var(--text-primary);}
  .big{font:400 120px/1 var(--font-display); color:var(--steel-primary); letter-spacing:-0.02em;}
  .meta{font-size:13px; line-height:1.5; color:var(--text-secondary);}
  .meta strong{color:var(--text-primary); font-weight:400; display:block; font-size:16px; margin-bottom:6px;}
  .meta code{background:#F5F7FA; padding:1px 6px; border-radius:4px; font-family:inherit; font-size:12px;}
</style></head><body>
<div class="wrap">
  <div class="big">Aa</div>
  <div class="meta">
    <strong>Marmelad Regular · 400</strong>
    One family, one weight, across every text style. Humanist curves give the system its "friendly but adult" tone. Loaded from Google Fonts; no local TTF needed.
    <div style="margin-top:10px;"><code>font-family: "Marmelad"</code></div>
  </div>
</div>
</body></html>

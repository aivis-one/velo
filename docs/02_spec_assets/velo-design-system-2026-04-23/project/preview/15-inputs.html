<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box; display:flex; flex-direction:column; gap:12px;}
  .group{display:flex; flex-direction:column; gap:4px;}
  .lbl{font-size:12px; color:var(--text-secondary);}
  .input{height:48px; border-radius:8px; border:1px solid #B0BCCD; background:#fff;
    padding:0 14px; font:400 15px/1 var(--font-display); color:var(--text-primary); outline:none;}
  .input::placeholder{color:#98A3B4;}
  .input:focus{border-color:#2F9EA8; box-shadow:0 0 0 3px rgba(47,158,168,0.15);}
  .input.err{border-color:#AD3444;}
  .hint{font-size:11px; color:#AD3444;}
  .row{display:flex; gap:12px;}
  .row .group{flex:1;}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="group">
      <div class="lbl">Email</div>
      <input class="input" value="alina@velo.app">
    </div>
    <div class="group">
      <div class="lbl">Пароль</div>
      <input class="input" type="password" placeholder="••••••••" style="border-color:#2F9EA8; box-shadow:0 0 0 3px rgba(47,158,168,0.15);">
    </div>
  </div>
  <div class="group">
    <div class="lbl">Код подтверждения</div>
    <input class="input err" placeholder="000000">
    <div class="hint">Код недействителен. Запросите новый.</div>
  </div>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-display);color:var(--text-primary);}
  .wrap{width:700px; padding:20px 24px; box-sizing:border-box;}
  .row{display:flex; gap:10px; margin-bottom:12px;}
  .sw{flex:1; height:80px; border-radius:10px; display:flex; flex-direction:column; justify-content:space-between; padding:10px 12px; box-sizing:border-box; box-shadow: inset 0 0 0 1px rgba(30,40,55,0.06); font-size:11px;}
  .sw .n{font-size:13px;}
  .sw .h{opacity:0.85; font-size:10px;}
  .cap{color:var(--text-secondary); font-size:12px;}
  h3{font-size:13px; color:var(--text-secondary); margin:0 0 8px; font-weight:400;}
</style></head><body>
<div class="wrap">
  <h3>Warm — check-in & emotional nudges</h3>
  <div class="row">
    <div class="sw" style="background:#FDF3E2; color:#A16124;"><span class="n">warm / 100</span><span class="h">#FDF3E2</span></div>
    <div class="sw" style="background:#FEECDB; color:#A16124;"><span class="n">warm / 50</span><span class="h">#FEECDB</span></div>
    <div class="sw" style="background:#FBC088; color:#A16124;"><span class="n">warm / primary</span><span class="h">#FBC088</span></div>
    <div class="sw" style="background:#D4863C; color:#fff;"><span class="n">warm / 700</span><span class="h">#D4863C</span></div>
    <div class="sw" style="background:#A16124; color:#fff;"><span class="n">warm / deep</span><span class="h">#A16124</span></div>
  </div>
  <h3 style="margin-top:6px;">Pink — soft emotional accent</h3>
  <div class="row">
    <div class="sw" style="background:#FDE2E2; color:#AD3444;"><span class="n">pink / 50</span><span class="h">#FDE2E2</span></div>
    <div class="sw" style="background:#FDDFE3; color:#AD3444;"><span class="n">pink / 100</span><span class="h">#FDDFE3</span></div>
    <div class="sw" style="background:#F795A2; color:#fff;"><span class="n">pink / primary</span><span class="h">#F795A2</span></div>
    <div class="sw" style="background:#AD3444; color:#fff;"><span class="n">pink / 700 · error</span><span class="h">#AD3444</span></div>
  </div>
</div>
</body></html>

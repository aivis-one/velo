<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, interactive-widget=resizes-visual" />
    <meta name="theme-color" content="#334D6E" />

    <!-- Google Fonts: preconnect + link (10.6: replaces @import in global.css). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Marmelad&display=swap" rel="stylesheet" />

    <!-- Telegram WebApp SDK: official CDN, always the current version. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- PWA support (Phase F0.4) -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>VELO</title>
  </head>
  <body>
    <!-- ПРОМТ №383: body-level, viewport-anchored fixed bg layer, static in the
         HTML (not Vue-rendered) so it paints at first paint, before #app.
         See global.css #app-bg -- this is the ONLY element that paints the
         mandala; it replaces the old #app::before approach, which rode up
         with the root's focus-driven scroll on Android keyboard-open. -->
    <div id="app-bg" aria-hidden="true"></div>
    <!-- Vue mounts here. Like FastAPI's app = FastAPI(). -->
    <div id="app"></div>
    <!-- Vite injects the <script> tag during build. -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

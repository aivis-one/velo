# =============================================================================
# VELO Frontend -- Internal Nginx (inside Docker container)
# =============================================================================
#
# Serves static files from /usr/share/nginx/html on port 3000.
# SPA fallback: any path that doesn't match a file -> index.html
# (so Vue Router history mode works).
#
# This is NOT the external Nginx on the host (that one handles SSL).
# =============================================================================

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster loading.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Static assets with long cache (Vite adds hash to filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Icons, manifest, etc.
    location /icons/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Background image.
    location /bg/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback: try the file, then the directory, then index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

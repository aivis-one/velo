# =============================================================================
# VELO Platform -- Docker Compose (root, CRITICAL-4: Redis auth)
# =============================================================================
#
# Single compose file for the entire stack:
#   - app:       FastAPI backend (Python)
#   - frontend:  Vue SPA served by Nginx (static files)
#   - postgres:  Database
#   - redis:     Cache / sessions (password-protected)
#
# Usage:
#   velo update   -- pull, build, migrate, test, restart
#   velo test     -- run tests inside container
#   velo status   -- health check
#
# Note: docker-compose.yml lives in repo root because it manages
# both backend/ and frontend/ build contexts.
# =============================================================================

services:
  app:
    build: ./backend
    container_name: velo-app
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL
        - VITE_TELEGRAM_BOT_URL
    container_name: velo-frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      app: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: velo-postgres
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - velo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velo -d velo"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: velo-redis
    env_file:
      - ./backend/.env
    # CRITICAL-4: Start Redis with password from .env.
    # In development (REDIS_PASSWORD=change-me or empty), still works --
    # clients must include password in REDIS_URL.
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes;
      else
        redis-server --appendonly yes;
      fi'
    volumes:
      - velo_redis_data:/data
    healthcheck:
      # CRITICAL-4: Use REDISCLI_AUTH env var for authenticated ping.
      # Docker passes REDIS_PASSWORD from env_file; redis-cli reads
      # REDISCLI_AUTH automatically (no password in CLI args).
      test: ["CMD-SHELL", "export REDISCLI_AUTH=$$REDIS_PASSWORD; redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  velo_postgres_data:
  velo_redis_data:

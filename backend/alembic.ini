# =============================================================================
# VELO Backend — Alembic Configuration
# =============================================================================
#
# WHAT IS ALEMBIC?
#   "Git for your database schema." When you change a model (add a column,
#   rename a table), Alembic generates a migration script that transforms
#   the old schema into the new one. Reversible, trackable, team-friendly.
#
# KEY COMMANDS:
#   alembic revision --autogenerate -m "add users table"  — create migration
#   alembic upgrade head                                   — apply all pending
#   alembic downgrade -1                                   — rollback last one
#   alembic history                                        — show all migrations
#
# NOTE: sqlalchemy.url is set dynamically in migrations/env.py from .env,
#   so the placeholder below is never actually used.
# =============================================================================

[alembic]
# Path to migration scripts (relative to this file).
script_location = migrations

# Template for new migration filenames.
# Example: 2026_02_07_0001_add_users_table.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for file_template timestamps.
timezone = UTC

# sqlalchemy.url is overridden in env.py — this is just a placeholder.
sqlalchemy.url = placeholder://set-in-env-py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

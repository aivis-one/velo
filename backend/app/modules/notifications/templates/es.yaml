# =============================================================================
# VELO -- Plantillas de notificaciones (Español)
# =============================================================================

# -- Recordatorios (Phase 7.4) --

reminder_24h:
  title: "Práctica mañana"
  body: "⏰ Recordatorio: <b>{practice_title}</b> comienza en 24 horas.\n\n📅 {scheduled_at}\n👤 Maestro: {master_name}"

reminder_1h:
  title: "Práctica en 1 hora"
  body: "⏰ <b>{practice_title}</b> comienza en 1 hora.\n\n📅 {scheduled_at}\n👤 Maestro: {master_name}"

reminder_10min:
  title: "Práctica a punto de comenzar"
  body: "🔔 <b>{practice_title}</b> comienza en 10 minutos.\n\n👤 Maestro: {master_name}"

# -- Recordatorios para el maestro (Phase 7.4) --

master_reminder_24h:
  title: "Tu práctica es mañana"
  body: "⏰ Recordatorio: tu práctica <b>{practice_title}</b> comienza en 24 horas.\n\n📅 {scheduled_at}\n👥 Participantes: {participants_count}"

master_reminder_1h:
  title: "Tu práctica en 1 hora"
  body: "⏰ Tu práctica <b>{practice_title}</b> comienza en 1 hora!\n\n📅 {scheduled_at}\n👥 Participantes: {participants_count}"

master_reminder_10min:
  title: "Tu práctica comienza pronto"
  body: "🔔 Tu práctica <b>{practice_title}</b> comienza en 10 minutos!\n\n👥 Participantes: {participants_count}"

# -- Ciclo de reservas --

booking_confirmed:
  title: "Reserva confirmada"
  body: "✅ Tu reserva para <b>{practice_title}</b> está confirmada.\n\n📅 {scheduled_at}\n👤 Maestro: {master_name}\n💰 Pagado: €{paid_amount}"

booking_cancelled:
  title: "Reserva cancelada"
  body: "❌ Tu reserva para <b>{practice_title}</b> ha sido cancelada.\n\n📅 {scheduled_at}"

# -- Ciclo de prácticas --

practice_cancelled:
  title: "Práctica cancelada"
  body: "❌ La práctica <b>{practice_title}</b> del {scheduled_at} ha sido cancelada por el maestro.\n\n💰 Tu pago ha sido reembolsado."

practice_updated:
  title: "Práctica actualizada"
  body: "📝 La práctica <b>{practice_title}</b> ha sido actualizada.\n\n📅 Nueva hora: {scheduled_at}\n👤 Maestro: {master_name}"

# -- Lista de espera --
# FIX 3.1: El usuario debe confirmar en 30 minutos.

waitlist_spot_available:
  title: "¡Plaza disponible!"
  body: "🎉 Se ha liberado una plaza para <b>{practice_title}</b>.\n\n📅 {scheduled_at}\n👤 Maestro: {master_name}\n\n⏳ Tienes <b>30 minutos</b> para confirmar tu plaza.\nToca el botón para reservar ahora."

waitlist_expired:
  title: "Lista de espera expirada"
  body: "⏳ Tu entrada en la lista de espera para <b>{practice_title}</b> ha expirado.\n\n📅 {scheduled_at}"

# -- Verificación de maestro --

master_verified:
  title: "Solicitud aprobada"
  body: "🎉 ¡Felicidades! Tu solicitud de maestro ha sido aprobada.\n\nAhora puedes crear y gestionar prácticas."

master_rejected:
  title: "Solicitud rechazada"
  body: "Tu solicitud de maestro ha sido revisada y lamentablemente no fue aprobada en este momento.\n\nPuedes enviar una nueva solicitud."

# -- Pagos --

topup_confirmed:
  title: "Recarga confirmada"
  body: "💰 Tu saldo ha sido recargado con <b>€{amount}</b>.\n\nSaldo actual: €{balance}"

withdrawal_approved:
  title: "Retiro aprobado"
  body: "💸 Tu retiro de <b>€{amount}</b> ha sido aprobado y está siendo procesado."

withdrawal_rejected:
  title: "Retiro rechazado"
  body: "Tu solicitud de retiro por €{amount} no fue aprobada.\n\nMotivo: {reason}"

# -- Feedback (Phase 8) --

leave_review:
  title: "¿Cómo fue tu práctica?"
  body: "📝 Asististe a <b>{practice_title}</b> con {master_name}.\n\nToca para dejar una reseña."

leave_feedback:
  title: "Comparte tu opinión"
  body: "📝 ¿Cómo fue <b>{practice_title}</b>?\n\nTu opinión ayuda a los maestros a mejorar."

# -- Sistema --

system_announcement:
  title: "{title}"
  body: "{body}"

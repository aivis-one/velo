# =============================================================================
# VELO -- Benachrichtigungsvorlagen (Deutsch)
# =============================================================================

# -- Erinnerungen (Phase 7.4) --

reminder_24h:
  title: "Praxis morgen"
  body: "⏰ Erinnerung: <b>{practice_title}</b> beginnt in 24 Stunden.\n\n📅 {scheduled_at}\n👤 Lehrer: {master_name}"

reminder_1h:
  title: "Praxis in 1 Stunde"
  body: "⏰ <b>{practice_title}</b> beginnt in 1 Stunde!\n\n📅 {scheduled_at}\n👤 Lehrer: {master_name}"

reminder_10min:
  title: "Praxis beginnt gleich"
  body: "🔔 <b>{practice_title}</b> beginnt in 10 Minuten!\n\n👤 Lehrer: {master_name}"

# -- Meister-Erinnerungen (Phase 7.4) --

master_reminder_24h:
  title: "Deine Praxis ist morgen"
  body: "⏰ Erinnerung: deine Praxis <b>{practice_title}</b> beginnt in 24 Stunden.\n\n📅 {scheduled_at}\n👥 Teilnehmer: {participants_count}"

master_reminder_1h:
  title: "Deine Praxis in 1 Stunde"
  body: "⏰ Deine Praxis <b>{practice_title}</b> beginnt in 1 Stunde!\n\n📅 {scheduled_at}\n👥 Teilnehmer: {participants_count}"

master_reminder_10min:
  title: "Deine Praxis beginnt gleich"
  body: "🔔 Deine Praxis <b>{practice_title}</b> beginnt in 10 Minuten!\n\n👥 Teilnehmer: {participants_count}"

# -- Buchungsablauf --

booking_confirmed:
  title: "Buchung bestätigt"
  body: "✅ Deine Buchung für <b>{practice_title}</b> ist bestätigt.\n\n📅 {scheduled_at}\n👤 Lehrer: {master_name}\n💰 Bezahlt: €{paid_amount}"

booking_cancelled:
  title: "Buchung storniert"
  body: "❌ Deine Buchung für <b>{practice_title}</b> wurde storniert.\n\n📅 {scheduled_at}"

# -- Praxisablauf --

practice_cancelled:
  title: "Praxis abgesagt"
  body: "❌ Die Praxis <b>{practice_title}</b> am {scheduled_at} wurde vom Lehrer abgesagt.\n\n💰 Deine Zahlung wurde erstattet."

practice_updated:
  title: "Praxis aktualisiert"
  body: "📝 Die Praxis <b>{practice_title}</b> wurde aktualisiert.\n\n📅 Neue Zeit: {scheduled_at}\n👤 Lehrer: {master_name}"

# -- Warteliste --
# FIX 3.1: Benutzer muss innerhalb von 30 Minuten bestätigen.

waitlist_spot_available:
  title: "Platz frei!"
  body: "🎉 Ein Platz für <b>{practice_title}</b> ist frei geworden!\n\n📅 {scheduled_at}\n👤 Lehrer: {master_name}\n\n⏳ Du hast <b>30 Minuten</b>, um deinen Platz zu bestätigen.\nTippe auf den Button, um jetzt zu buchen."

waitlist_expired:
  title: "Warteliste abgelaufen"
  body: "⏳ Dein Wartelisteneintrag für <b>{practice_title}</b> ist abgelaufen.\n\n📅 {scheduled_at}"

# -- Lehrerverifizierung --

master_verified:
  title: "Bewerbung genehmigt"
  body: "🎉 Herzlichen Glückwunsch! Deine Lehrerbewerbung wurde genehmigt.\n\nDu kannst jetzt Praxen erstellen und verwalten."

master_rejected:
  title: "Bewerbung abgelehnt"
  body: "Deine Lehrerbewerbung wurde geprüft und konnte leider nicht genehmigt werden.\n\nDu kannst eine neue Bewerbung einreichen."

# -- Zahlungen --

topup_confirmed:
  title: "Aufladung bestätigt"
  body: "💰 Dein Guthaben wurde um <b>€{amount}</b> aufgeladen.\n\nAktueller Kontostand: €{balance}"

withdrawal_approved:
  title: "Auszahlung genehmigt"
  body: "💸 Deine Auszahlung von <b>€{amount}</b> wurde genehmigt und wird bearbeitet."

withdrawal_rejected:
  title: "Auszahlung abgelehnt"
  body: "Deine Auszahlungsanfrage über €{amount} wurde nicht genehmigt.\n\nGrund: {reason}"

# -- Feedback (Phase 8) --

leave_review:
  title: "Wie war deine Praxis?"
  body: "📝 Du hast an <b>{practice_title}</b> mit {master_name} teilgenommen.\n\nTippe, um eine Bewertung abzugeben."

leave_feedback:
  title: "Teile dein Feedback"
  body: "📝 Wie war <b>{practice_title}</b>?\n\nDein Feedback hilft Lehrern, ihre Praxen zu verbessern."

# -- System --

system_announcement:
  title: "{title}"
  body: "{body}"

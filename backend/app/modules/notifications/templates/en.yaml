# =============================================================================
# VELO -- Notification Templates (English)
# =============================================================================
#
# Variables come from Notification.action_data JSONB.
# HTML tags allowed (Telegram HTML parse mode).
# Missing variables render as literal "{key}" (SafeDict).
# =============================================================================

# -- Reminders (Phase 7.4) --

reminder_24h:
  title: "Practice tomorrow"
  body: "⏰ Reminder: <b>{practice_title}</b> starts in 24 hours.\n\n📅 {scheduled_at}\n👤 Master: {master_name}"

reminder_1h:
  title: "Practice in 1 hour"
  body: "⏰ <b>{practice_title}</b> starts in 1 hour!\n\n📅 {scheduled_at}\n👤 Master: {master_name}"

reminder_10min:
  title: "Practice starting soon"
  body: "🔔 <b>{practice_title}</b> starts in 10 minutes!\n\n👤 Master: {master_name}"

# -- Booking lifecycle --

booking_confirmed:
  title: "Booking confirmed"
  body: "✅ Your booking for <b>{practice_title}</b> is confirmed.\n\n📅 {scheduled_at}\n👤 Master: {master_name}\n💰 Paid: €{paid_amount}"

booking_cancelled:
  title: "Booking cancelled"
  body: "❌ Your booking for <b>{practice_title}</b> has been cancelled.\n\n📅 {scheduled_at}"

# -- Practice lifecycle --

practice_cancelled:
  title: "Practice cancelled"
  body: "❌ Practice <b>{practice_title}</b> on {scheduled_at} has been cancelled by the master.\n\n💰 Your payment has been refunded."

practice_updated:
  title: "Practice updated"
  body: "📝 Practice <b>{practice_title}</b> has been updated.\n\n📅 New time: {scheduled_at}\n👤 Master: {master_name}"

# -- Waitlist --

waitlist_spot_available:
  title: "Spot available!"
  body: "🎉 A spot opened up for <b>{practice_title}</b>!\n\n📅 {scheduled_at}\n👤 Master: {master_name}\n\nYou have been automatically booked."

waitlist_expired:
  title: "Waitlist expired"
  body: "⏳ Your waitlist entry for <b>{practice_title}</b> has expired.\n\n📅 {scheduled_at}"

# -- Master verification --

master_verified:
  title: "Application approved"
  body: "🎉 Congratulations! Your master application has been approved.\n\nYou can now create and manage practices."

master_rejected:
  title: "Application rejected"
  body: "Your master application has been reviewed and unfortunately was not approved at this time.\n\nYou can submit a new application."

# -- Payments --

topup_confirmed:
  title: "Top-up confirmed"
  body: "💰 Your wallet has been topped up with <b>€{amount}</b>.\n\n💳 New balance: €{new_balance}"

withdrawal_approved:
  title: "Withdrawal approved"
  body: "💸 Your withdrawal of <b>€{amount}</b> has been approved.\n\nFunds will be transferred to your payout account."

withdrawal_rejected:
  title: "Withdrawal rejected"
  body: "Your withdrawal request of <b>€{amount}</b> has been rejected.\n\nReason: {reason}\n\nFunds have been returned to your available balance."

# -- Feedback (Phase 8) --

leave_review:
  title: "How was your practice?"
  body: "🙏 You attended <b>{practice_title}</b> with {master_name}.\n\nPlease leave a review to help the community!"

leave_feedback:
  title: "Share your feedback"
  body: "🙏 How was <b>{practice_title}</b>?\n\nYour feedback helps {master_name} improve their practices."

# -- System --

system_announcement:
  title: "{title}"
  body: "{body}"
